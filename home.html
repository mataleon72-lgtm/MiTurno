<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis Turnos - Paciente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #F8F8F8; 
            margin: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
        }

        .app-lienzo {
            position: relative;
            width: 100%;
            max-width: 432px;
            height: 960px; 
            background-image: url('https://mataleon72-lgtm.github.io/MiTurno/lienzo_panel.png');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .app-lienzo::-webkit-scrollbar { display: none; }

        /* CONTENEDORES DE PANTALLA */
        .contenedor { 
            width: 85%; 
            padding-top: 60px; 
            padding-bottom: 50px; 
            display: none; 
            flex-direction: column;
            align-items: center;
        }
        .contenedor.activa { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* IMÁGENES DEL DISEÑO */
        .img-titulo { width: 95%; margin-bottom: 10px; } 
        .img-puntos { width: 30%; margin-bottom: 25px; } 
        .btn-img { width: 85%; margin-top: 5px; cursor: pointer; transition: transform 0.2s; }
        .btn-img:active { transform: scale(0.96); }
        .btn-link-img { width: 65%; margin-top: 25px; cursor: pointer; transition: transform 0.2s; }
        .btn-link-img:active { transform: scale(0.96); }

        /* TEXTOS DE COREL */
        .texto-gris-oscuro { color: #555; font-weight: 900; font-size: 22px; margin-bottom: 5px; text-align: center; }
        .texto-instruccion { color: #555; font-weight: 900; font-size: 16px; margin-bottom: 10px; margin-top: 15px; text-align: center;}
        
        label { font-weight: 900; color: #7A7A7A; font-size: 14px; width: 100%; text-align: left; padding-left: 10px; margin-bottom: 5px; display: block; }
        
        input, select { 
            width: 100%; padding: 16px 20px; border-radius: 20px; border: none; 
            background: #FFFFFF;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.06); 
            margin-bottom: 18px; box-sizing: border-box; font-size: 15px; font-weight: 800; color: #555; font-family: 'Nunito', sans-serif; outline: none;
        }
        input::placeholder { color: #A0A0A0; font-weight: 800; }
        input:focus, select:focus { box-shadow: 0px 4px 12px rgba(0, 158, 155, 0.2); }

        /* BUSCADOR ALINEADO (Alias + Botón Agregar) */
        .buscador-row {
            display: flex; width: 100%; gap: 10px; align-items: center; margin-bottom: 20px;
        }
        .buscador-row input { margin-bottom: 0; flex: 1; }
        .buscador-row img { width: 110px; height: auto; cursor: pointer; transition: transform 0.2s; }
        .buscador-row img:active { transform: scale(0.95); }

        /* TARJETAS DE PROFESIONALES (Agenda) */
        .tarjeta-medico {
            background: #FFFFFF; padding: 18px 20px; border-radius: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; cursor: pointer;
        }
        .tarjeta-medico h4 { margin: 0; color: #444; font-size: 16px; font-weight: 900; }
        .tarjeta-medico p { margin: 3px 0 0 0; color: #007D82; font-size: 13px; font-weight: 800; }
        .icono-calendario { font-size: 24px; color: #555; opacity: 0.8; }

        /* TARJETAS DE MIS TURNOS (Con franja a la derecha) */
        .tarjeta-turno {
            position: relative; background: #FFFFFF; border-radius: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box;
            display: flex; flex-direction: column; overflow: hidden; padding: 20px;
        }
        .franja-estado { position: absolute; top: 0; right: 0; bottom: 0; width: 15px; }
        .franja-verde { background-color: #6EB64F; }
        .franja-roja { background-color: #ED3237; }

        .tarjeta-turno h4 { margin: 0 0 3px 0; color: #444; font-size: 17px; font-weight: 900; }
        .tarjeta-turno h5 { margin: 0 0 10px 0; color: #007D82; font-size: 14px; font-weight: 800; }
        .tarjeta-turno p { margin: 4px 0; color: #333; font-size: 14px; font-weight: 900; display: flex; align-items: center; gap: 8px;}
        .tarjeta-turno p span { color: #555; }
        
        .badge-rojo { position: absolute; top: 20px; right: 30px; color: #ED3237; font-weight: 900; font-size: 13px; }

        .btn-cancelar-turno {
            align-self: flex-start; background: none; border: none; color: #ED3237; font-weight: 900; font-size: 14px; 
            margin-top: 15px; cursor: pointer; padding: 0;
        }

        /* TURNERO DESPLEGABLE */
        .bloque-turnero { 
            background: #FFFFFF; padding: 20px; border-radius: 20px; margin-bottom: 20px; 
            display: none; width: 100%; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px dashed #009E9B;
        }
        .grilla-horas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-hora { background: #F8F8F8; color: #555; border: none; padding: 12px; border-radius: 12px; font-weight: 900; text-align: center; cursor: pointer; font-size: 14px; }
        .btn-hora:hover { background: #009E9B; color: white; }

    </style>
</head>
<body>

    <div class="app-lienzo">
        
        <div id="pantalla-login" class="contenedor activa">
            <h2 class="texto-gris-oscuro" style="font-size: 28px; margin-top: 40px;">Ingresa a tu cuenta</h2>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel3.png" class="img-puntos">
            
            <div style="width: 100%; margin-top: 10px;">
                <label style="text-align: center;">Coloca tu número de DNI</label>
                <input type="number" id="login-dni" placeholder="EJ: 3045456565">
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_entrar.png" class="btn-img" style="margin-top: 5px;" onclick="ingresarPaciente()">
            
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_crearcuenta.png" class="btn-link-img" onclick="irARegistro()">
        </div>

        <div id="pantalla-registro" class="contenedor">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo_registrodeusuario.png" class="img-titulo">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel4.png" class="img-puntos">
            
            <div style="width: 100%;">
                <label>Nombre y Apellido</label>
                <input type="text" id="reg-nombre" placeholder="Ej: Juan Pérez">
                
                <label>Teléfono Celular</label>
                <input type="tel

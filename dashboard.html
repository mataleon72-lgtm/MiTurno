<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Gestión - Mi Turno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #F8F8F8; 
            margin: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
        }

        /* LIENZO SIN BARRA DE SCROLL VISIBLE */
        .app-lienzo {
            position: relative;
            width: 100%;
            max-width: 432px;
            height: 960px; 
            background-image: url('https://mataleon72-lgtm.github.io/MiTurno/lienzo_panel.png');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Magia para ocultar el scrollbar manteniendo la función */
            -ms-overflow-style: none;  /* IE y Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .app-lienzo::-webkit-scrollbar { 
            display: none; /* Chrome, Safari y Opera */
        }

        /* CONTENEDORES CON EL MARGEN SUPERIOR CORREGIDO */
        .contenedor { 
            width: 85%; 
            padding-top: 50px; /* Sube para pisar la trama gris clara del fondo */
            padding-bottom: 50px;
            display: none; 
            flex-direction: column;
            align-items: center;
        }
        .contenedor.activa { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* IMÁGENES DEL DISEÑO */
        .img-titulo { width: 95%; margin-bottom: 5px; } 
        .img-puntos { width: 30%; margin-bottom: 30px; } 
        .btn-img { width: 85%; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
        .btn-img:active { transform: scale(0.96); }
        .btn-link-img { width: 55%; margin-top: 10px; cursor: pointer; transition: transform 0.2s; }
        .btn-link-img:active { transform: scale(0.96); }

        /* ETIQUETAS E INPUTS ESTILO COREL (Blancos redondos con sombra sutil) */
        label { 
            font-weight: 800; color: #7A7A7A; font-size: 13px; 
            width: 100%; text-align: left; padding-left: 10px; margin-bottom: 5px; display: block;
        }
        input, select { 
            width: 100%; padding: 15px 20px; border-radius: 25px; border: none; 
            background: #FFFFFF;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.06); 
            margin-bottom: 20px; box-sizing: border-box; font-size: 14px; font-weight: 800; color: #7A7A7A; font-family: 'Nunito', sans-serif; outline: none;
        }
        input:focus, select:focus { box-shadow: 0px 4px 12px rgba(0, 158, 155, 0.2); }

        /* CAJAS BLANCAS PARA LOS TURNOS */
        .caja-blanca { 
            width: 100%; background: #FFFFFF; border-radius: 20px; padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; box-sizing: border-box;
            min-height: 60px;
        }
        .linea-color { width: 25px; height: 4px; border-radius: 2px; margin-bottom: 5px; margin-left: 5px;}

        /* ITEMS INTERNOS DE LAS LISTAS */
        .item-turno {
            padding: 10px 0; border-bottom: 1px solid #F0F0F0;
            font-weight: 800; color: #555; display: flex; justify-content: space-between; align-items: center;
            font-size: 13px;
        }
        .item-turno:last-child { border-bottom: none; }
        .item-turno small { color: #999; display: block; font-size: 11px; font-weight: 800; margin-top: 2px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; color: white; font-weight: 900; }
        .badge.ok { background: #6EB64F; }
        .badge.cancel { background: #ED3237; }
        .btn-borrar-horario { background: none; border: none; color: #ED3237; font-size: 16px; cursor: pointer; padding: 0; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="app-lienzo">
        
        <div id="seccion-agenda" class="contenedor activa">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo%20mi%20agenda.png" class="img-titulo" alt="Mi Agenda">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel3.png" class="img-puntos">
            
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_crearsucursal.png" class="btn-img" onclick="mostrarPantallaSucursales()">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_configurarhorarios.png" class="btn-img" onclick="mostrarPantallaHorarios()">
            
            <div style="width: 100%; margin-top: 5px;">
                <label>Sucursal</label>
                <select id="agenda-sucursal" onchange="cargarTurnos()"></select>
                
                <label>Fecha</label>
                <input type="date" id="agenda-fecha" onchange="cargarTurnos()">
                
                <div class="linea-color" style="background-color: #6EB64F;"></div>
                <label>Turnos programados</label>
                <div class="caja-blanca" id="lista-turnos"></div>

                <div class="linea-color" style="background-color: #ED3237;"></div>
                <label>Turnos cancelados</label>
                <div class="caja-blanca" id="lista-cancelados"></div>
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_cerrarsesion.png" class="btn-link-img" style="width: 45%; margin-top: 5px;" onclick="cerrarSesion()">
        </div>

        <div id="seccion-sucursales" class="contenedor">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo_missucursales.png" class="img-titulo" onerror="this.style.display='none'"> 
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel5.png" class="img-puntos">
            
            <div style="width: 100%;">
                <select id="select-editar-sucursal" onchange="cargarDatosSucursalAEditar()" style="background:#F0F0F0; font-size: 12px; margin-bottom: 25px; padding: 10px 20px;">
                    <option value="NUEVA">-- Crear Nueva Sucursal --</option>
                </select>

                <label>Crear sucursal</label>
                <input type="text" id="suc-nombre" placeholder="Nombre de la sucursal">
                
                <input type="text" id="suc-dir" placeholder="Dirección de la sucursal" style="margin-top: -5px;">
                
                <label>Cobro de seña / Mercado Pago</label>
                <input type="text" id="suc-mp-link" placeholder="EJ:http://mpago.la//xxxxx">
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_guardar.png" class="btn-img" style="margin-top: 5px;" onclick="guardarOActualizarSucursal()">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_volveramiagenda.png" class="btn-link-img" onclick="mostrarPantallaAgenda()">
        </div>

        <div id="seccion-horarios" class="contenedor">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo_mishorarios.png" class="img-titulo" onerror="this.style.display='none'">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel4.png" class="img-puntos">
            
            <div style="width: 100%;">
                <label style="text-align: center; margin-bottom: 20px; font-size: 14px; font-weight: 900; color: #555;">Crea tus franjas de atención</label>
                
                <label>Seleccionar Sucursal</label>
                <select id="hor-sucursal" onchange="cargarHorarios()"></select>
                
                <label>Día de la semana</label>
                <select id="hor-dia">
                    <option value="1">Lunes</option><option value="2">Martes</option>
                    <option value="3">Miércoles</option><option value="4">Jueves</option>
                    <option value="5">Viernes</option><option value="6">Sábado</option>
                    <option value="0">Domingo</option>
                </select>
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1">
                        <label>Desde</label>
                        <input type="time" id="hor-inicio" value="08:00">
                    </div>
                    <div style="flex:1">
                        <label>Hasta</label>
                        <input type="time" id="hor-fin" value="20:00">
                    </div>
                </div>
                
                <label>Duración de cada Turno</label>
                <select id="hor-duracion">
                    <option value="20">20 Minutos</option>
                    <option value="30" selected>30 Minutos por Defecto</option>
                    <option value="40">40 Minutos</option>
                    <option value="60">60 Minutos</option>
                </select>
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_asignarhorarios.png" class="btn-img" style="margin-top: 10px;" onclick="guardarHorario()">
            
            <div style="width: 100%; margin-top: 15px;">
                <label>Mis Horarios</label>
                <div class="caja-blanca" id="lista-horarios" style="padding: 10px 15px;"></div>
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_volveramiagenda.png" class="btn-link-img" onclick="mostrarPantallaAgenda()">
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://mvvfkmlgnmkvwnuvtryh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbm1rdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM2ODcsImV4cCI6MjA5NTgxOTY4N30.2HG0ZWeEIpMKdi2RNqlqY_bcK99DiRwpEkN-eHVjSe0';
        const supabaseCliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const idMedico = localStorage.getItem('mi_turno_negocio_id'); 

        if (!idMedico) {
            alert("Tu sesión expiró. Volvé a ingresar desde el panel.");
            window.location.href = "panel.html";
        }

        document.getElementById('agenda-fecha').value = new Date().toISOString().split('T')[0];

        async function init() {
            await cargarSelectores();
        }

        function mostrarPantallaSucursales() { switchSeccion('seccion-sucursales'); }
        function mostrarPantallaHorarios() { switchSeccion('seccion-horarios'); cargarSelectores(); }
        function mostrarPantallaAgenda() { switchSeccion('seccion-agenda'); cargarSelectores(); }
        function switchSeccion(id) { 
            document.querySelectorAll('.contenedor').forEach(c => c.classList.remove('activa')); 
            document.getElementById(id).classList.add('activa'); 
            document.querySelector('.app-lienzo').scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        async function cargarSelectores() {
            const { data } = await supabaseCliente.from('sucursales').select('*').eq('negocio_id', idMedico).order('nombre');
            
            const opcionesSedes = data?.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('') || '';
            document.getElementById('agenda-sucursal').innerHTML = opcionesSedes || '<option value="">Crea una sucursal primero</option>';
            document.getElementById('hor-sucursal').innerHTML = opcionesSedes || '<option value="">Crea una sucursal primero</option>';
            document.getElementById('select-editar-sucursal').innerHTML = '<option value="NUEVA">-- Crear Nueva Sucursal --</option>' + opcionesSedes;

            cargarTurnos();
            cargarHorarios();
        }

        async function cargarDatosSucursalAEditar() {
            const idSucElegida = document.getElementById('select-editar-sucursal').value;
            if (idSucElegida === 'NUEVA') {
                document.getElementById('suc-nombre').value = '';
                document.getElementById('suc-dir').value = '';
                document.getElementById('suc-mp-link').value = '';
            } else {
                const { data } = await supabaseCliente.from('sucursales').select('*').eq('id', idSucElegida).single();
                if (data) {
                    document.getElementById('suc-nombre').value = data.nombre;
                    document.getElementById('suc-dir').value = data.direccion || '';
                    document.getElementById('suc-mp-link').value = data.link_mercadopago || '';
                }
            }
        }

        async function guardarOActualizarSucursal() {
            const idSucElegida = document.getElementById('select-editar-sucursal').value;
            const nombre = document.getElementById('suc-nombre').value.trim();
            const direccion = document.getElementById('suc-dir').value.trim();
            const mpLink = document.getElementById('suc-mp-link').value.trim();

            if(!nombre || !direccion) return alert("Completá el Nombre y la Dirección");

            if (idSucElegida === 'NUEVA') {
                await supabaseCliente.from('sucursales').insert([{ negocio_id: idMedico, nombre, direccion, link_mercadopago: mpLink }]);
                alert("¡Sucursal creada con éxito!");
            } else {
                await supabaseCliente.from('sucursales').update({ nombre, direccion, link_mercadopago: mpLink }).eq('id', idSucElegida);
                alert("¡Datos actualizados con éxito en Supabase!");
            }

            document.getElementById('select-editar-sucursal').value = 'NUEVA';
            document.getElementById('suc-nombre').value = '';
            document.getElementById('suc-dir').value = '';
            document.getElementById('suc-mp-link').value = '';
            
            await cargarSelectores();
        }

        async function guardarHorario() {
            const idSuc = document.getElementById('hor-sucursal').value;
            if(!idSuc) return alert("Seleccioná una sucursal");
            const dia = document.getElementById('hor-dia').value;
            let ini = document.getElementById('hor-inicio').value;
            let fin = document.getElementById('hor-fin').value;
            const duracion = document.getElementById('hor-duracion').value;

            if(ini.length === 5) ini = ini + ":00";
            if(fin.length === 5) fin = fin + ":00";

            await supabaseCliente.from('configuracion_agenda').insert([{ negocio_id: idMedico, sucursal_id: idSuc, dia_semana: parseInt(dia), hora_inicio: ini, hora_fin: fin, duracion_minutos: parseInt(duracion), cupo_maximo: 1 }]);
            alert("¡Horario asignado con éxito!");
            await cargarHorarios();
        }

        async function cargarHorarios() {
            const idSuc = document.getElementById('hor-sucursal').value;
            if(!idSuc) return;
            const { data } = await supabaseCliente.from('configuracion_agenda').select('*').eq('sucursal_id', idSuc);
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            
            document.getElementById('lista-horarios').innerHTML = data?.map(h => `
                <div class="item-turno">
                    <div>${dias[h.dia_semana]} <small>${h.hora_inicio.slice(0,5)} a ${h.hora_fin.slice(0,5)} hs</small></div>
                    <button class="btn-borrar-horario" onclick="eliminarHorario('${h.id}')">🗑️</button>
                </div>
            `).join('') || '<p style="text-align:center; color:#A0A0A0; font-size:13px; margin:0;">Sin horarios asignados.</p>';
        }

        async function eliminarHorario(idHorario) {
            if(!confirm("¿Estás seguro de que querés borrar esta franja horaria?")) return;
            const { error } = await supabaseCliente.from('configuracion_agenda').delete().eq('id', idHorario);
            if(error) alert("Error: " + error.message);
            else cargarHorarios();
        }

        async function cargarTurnos() {
            const idSuc = document.getElementById('agenda-sucursal').value;
            const fecha = document.getElementById('agenda-fecha').value;
            if(!idSuc || !fecha) return;

            const quinceMinutosAtras = new Date(Date.now() - 15 * 60 * 1000).toISOString();
            await supabaseCliente.from('turnos_activos').delete().eq('estado', 'pendiente').lt('creado_at', quinceMinutosAtras);

            const { data: turnos } = await supabaseCliente.from('turnos_activos').select('*').eq('sucursal_id', idSuc).eq('fecha', fecha).order('hora');
            
            let activosHtml = '';
            let canceladosHtml = '';

            turnos?.forEach(t => {
                const esCancelado = t.estado === 'cancelado_por_paciente';
                const card = `
                    <div class="item-turno">
                        <div>[${t.hora.slice(0,5)}] ${t.cliente_nombre || 'Paciente'}<small>Tel: ${t.cliente_telefono || 'Sin especificar'}</small></div>
                        <span class="badge ${esCancelado ? 'cancel' : 'ok'}">${esCancelado ? 'CANCELADO' : 'CONFIRMADO'}</span>
                    </div>
                `;
                if(esCancelado) canceladosHtml += card;
                else activosHtml += card;
            });

            document.getElementById('lista-turnos').innerHTML = activosHtml || '<p style="text-align:center; color:#A0A0A0; font-size:13px; margin:0;">No hay turnos agendados.</p>';
            document.getElementById('lista-cancelados').innerHTML = canceladosHtml || '<p style="text-align:center; color:#A0A0A0; font-size:13px; margin:0;">Sin cancelaciones.</p>';
        }

        function cerrarSesion() { localStorage.removeItem('mi_turno_negocio_id'); window.location.href = "panel.html"; }
        init();
    </script>
</body>
</html>

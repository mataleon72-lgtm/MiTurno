<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Gestión - Mi Turno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #F8F8F8; 
            margin: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
        }

        /* LIENZO SIN BARRA DE SCROLL VISIBLE */
        .app-lienzo {
            position: relative;
            width: 100%;
            max-width: 432px;
            height: 960px; 
            background-image: url('https://mataleon72-lgtm.github.io/MiTurno/lienzo_panel.png');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .app-lienzo::-webkit-scrollbar { 
            display: none; 
        }

        /* CONTENEDORES MÁS ARRIBA PARA PISAR EL DISEÑO GRIS */
        .contenedor { 
            width: 85%; 
            padding-top: 15px; 
            padding-bottom: 50px;
            display: none; 
            flex-direction: column;
            align-items: center;
        }
        .contenedor.activa { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* IMÁGENES DEL DISEÑO (Ajuste de espacios) */
        .img-titulo { width: 95%; margin-bottom: 0px; margin-top: 10px;} 
        .img-puntos { width: 30%; margin-top: 5px; margin-bottom: 25px; } 
        .btn-img { width: 85%; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
        .btn-img:active { transform: scale(0.96); }
        .btn-link-img { width: 55%; margin-top: 10px; cursor: pointer; transition: transform 0.2s; }
        .btn-link-img:active { transform: scale(0.96); }

        /* ETIQUETAS E INPUTS ESTILO COREL */
        label { 
            font-weight: 800; color: #7A7A7A; font-size: 13px; 
            width: 100%; text-align: left; padding-left: 5px; margin-bottom: 5px; display: block;
        }
        input, select { 
            width: 100%; padding: 15px 20px; border-radius: 25px; border: none; 
            background: #FFFFFF;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.06); 
            margin-bottom: 20px; box-sizing: border-box; font-size: 14px; font-weight: 800; color: #7A7A7A; font-family: 'Nunito', sans-serif; outline: none;
        }
        input:focus, select:focus { box-shadow: 0px 4px 12px rgba(0, 158, 155, 0.2); }

        /* CAJAS BLANCAS CON LÍNEA INTEGRADA */
        .caja-blanca { 
            position: relative;
            overflow: hidden; 
            width: 100%; background: #FFFFFF; border-radius: 20px; padding: 25px 15px 15px 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; box-sizing: border-box;
            min-height: 70px; display: flex; flex-direction: column; justify-content: center;
        }
        
        /* LAS LÍNEAS PEGADAS ARRIBA A LA IZQUIERDA */
        .linea-verde { position: absolute; top: 0; left: 0; width: 100px; height: 8px; background-color: #6EB64F; }
        .linea-roja { position: absolute; top: 0; left: 0; width: 100px; height: 8px; background-color: #ED3237; }

        /* ITEMS INTERNOS DE LAS LISTAS */
        .item-turno {
            padding: 10px 0; border-bottom: 1px solid #F0F0F0;
            font-weight: 800; color: #555; display: flex; justify-content: space-between; align-items: center;
            font-size: 13px;
        }
        .item-turno:last-child { border-bottom: none; }
        .item-turno small { color: #999; display: block; font-size: 11px; font-weight: 800; margin-top: 2px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; color: white; font-weight: 900; }
        .badge.ok { background: #6EB64F; }
        .badge.cancel { background: #ED3237; }
        .badge.waiting { background: #F4B41A; animation: blinker 1s linear infinite; } /* Alerta titilante para la lista */
        .btn-borrar-horario { background: none; border: none; color: #ED3237; font-size: 16px; cursor: pointer; padding: 0; margin-left: 10px; }

        @keyframes blinker { 50% { opacity: 0.4; } }

        /* --- ESTILOS MODAL INCLUSIVO SALA ESPERA --- */
        .modal-espera-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #F4B41A; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; box-sizing: border-box; cursor: pointer; }
        @keyframes parpadeoEstroboscopico { 0% { background-color: #F4B41A; } 50% { background-color: #009E9B; } 100% { background-color: #F4B41A; } }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .estrobo-activo { animation: parpadeoEstroboscopico 0.3s infinite !important; }
    </style>
</head>
<body>

    <div id="alerta-sala-espera" class="modal-espera-overlay" onclick="silenciarAlertaEspera()">
        <div style="font-size: 90px; margin-bottom: 20px; animation: bounce 0.5s infinite alternate;">🛋️</div>
        <h2 style="font-weight: 900; color: white; font-size: 32px; margin: 0 0 10px 0; letter-spacing: 1px;">PACIENTE EN SALA DE ESPERA</h2>
        <p id="nombre-paciente-espera" style="font-weight: 900; color: #333; font-size: 26px; background: white; padding: 15px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 15px 0 30px 0; max-width: 350px; text-transform: uppercase;"></p>
        <span style="font-weight: 800; color: white; font-size: 14px; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 50px;">👉 TOCAR PANTALLA PARA ASENTIR 👈</span>
    </div>

                <div class="caja-blanca">
                    <div class="linea-roja"></div>
                    <div id="lista-cancelados" style="margin-top: 5px;"></div>
                </div>
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_cerrarsesion.png" class="btn-link-img" style="width: 45%; margin-top: 5px;" onclick="cerrarSesion()">
        </div>

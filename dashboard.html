<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Gestión - Mi Turno</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #F8F8F8; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .app-lienzo { position: relative; width: 100%; max-width: 432px; height: 960px; background-image: url('https://mataleon72-lgtm.github.io/MiTurno/lienzo_panel.png'); background-size: cover; background-position: top center; background-repeat: no-repeat; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; -ms-overflow-style: none; scrollbar-width: none; }
        .app-lienzo::-webkit-scrollbar { display: none; }
        .contenedor { width: 85%; padding-top: 15px; padding-bottom: 50px; display: none; flex-direction: column; align-items: center; }
        .contenedor.activa { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .img-titulo { width: 95%; margin-bottom: 0px; margin-top: 10px;} 
        .img-puntos { width: 30%; margin-top: 5px; margin-bottom: 25px; } 
        .btn-img { width: 85%; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
        .btn-img:active { transform: scale(0.96); }
        .btn-link-img { width: 55%; margin-top: 10px; cursor: pointer; transition: transform 0.2s; }
        .btn-link-img:active { transform: scale(0.96); }
        
        label { 
            font-weight: 900 !important; 
            color: #FFFFFF !important; 
            text-shadow: 0px 1px 4px rgba(0,0,0,0.6) !important;
            font-size: 14px !important; 
            width: 100%; text-align: left; padding-left: 5px; margin-bottom: 6px; display: block;
        }
        input, select { width: 100%; padding: 15px 20px; border-radius: 25px; border: none; background: #FFFFFF; box-shadow: 0px 4px 10px rgba(0,0,0,0.06); margin-bottom: 20px; box-sizing: border-box; font-size: 14px; font-weight: 800; color: #7A7A7A; font-family: 'Nunito', sans-serif; outline: none; }
        input:focus, select:focus { box-shadow: 0px 4px 12px rgba(0, 158, 155, 0.2); }
        .caja-blanca { position: relative; overflow: hidden; width: 100%; background: #FFFFFF; border-radius: 20px; padding: 25px 15px 15px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; box-sizing: border-box; min-height: 70px; display: flex; flex-direction: column; justify-content: center; }
        .linea-verde { position: absolute; top: 0; left: 0; width: 100px; height: 8px; background-color: #6EB64F; }
        .linea-roja { position: absolute; top: 0; left: 0; width: 100px; height: 8px; background-color: #ED3237; }
        .item-turno { padding: 12px 0; border-bottom: 1px solid #F0F0F0; font-weight: 800; color: #555; display: flex; flex-direction: column; justify-content: flex-start; font-size: 13px; }
        .item-turno:last-child { border-bottom: none; }
        .item-turno small { color: #999; display: block; font-size: 11px; font-weight: 800; margin-top: 2px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; color: white; font-weight: 900; text-align: center; margin-top: 5px; display: inline-block; width: max-content; }
        .badge.ok { background: #6EB64F; }
        .badge.cancel { background: #ED3237; }
        .badge.waiting { background: #F4B41A; animation: blinker 1s linear infinite; }
        .badge.block { background: #555555; }
        .btn-borrar-horario { background: none; border: none; color: #ED3237; font-size: 16px; cursor: pointer; padding: 0; margin-left: 10px; }
        @keyframes blinker { 50% { opacity: 0.4; } }
        
        .modal-espera-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #F4B41A; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 30px; box-sizing: border-box; cursor: pointer; }
        @keyframes parpadeoEstroboscopico { 0% { background-color: #F4B41A; } 50% { background-color: #009E9B; } 100% { background-color: #F4B41A; } }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        .estrobo-activo { animation: parpadeoEstroboscopico 0.3s infinite !important; }

        /* --- ESTILOS PARA EL CARRUSEL DE FECHAS --- */
        .carrusel-fechas { display: flex; overflow-x: auto; scroll-behavior: smooth; width: 100%; gap: 10px; padding-bottom: 15px; margin-bottom: 5px; -ms-overflow-style: none; scrollbar-width: none; }
        .carrusel-fechas::-webkit-scrollbar { display: none; }
        .dia-globo { min-width: 65px; height: 75px; background: #FFFFFF; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.08); transition: all 0.2s ease; color: #7A7A7A; border: 2px solid transparent; }
        .dia-globo:active { transform: scale(0.95); }
        .dia-globo.activo { background: #6EB64F; color: #FFFFFF; transform: scale(1.05); box-shadow: 0 6px 15px rgba(110, 182, 79, 0.4); border-color: #FFFFFF; }
        .dia-globo span.nombre-dia { font-size: 12px; font-weight: 900; text-transform: uppercase; }
        .dia-globo span.numero-dia { font-size: 24px; font-weight: 900; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="alerta-sala-espera" class="modal-espera-overlay" onclick="silenciarAlertaEspera()">
        <div style="font-size: 90px; margin-bottom: 20px; animation: bounce 0.5s infinite alternate;">🛋️</div>
        <h2 style="font-weight: 900; color: white; font-size: 32px; margin: 0 0 10px 0;">PACIENTE EN SALA DE ESPERA</h2>
        <p id="nombre-paciente-espera" style="font-weight: 900; color: #333; font-size: 26px; background: white; padding: 15px 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 15px 0 30px 0; text-transform: uppercase;"></p>
        <span style="font-weight: 800; color: white; font-size: 14px; background: rgba(0,0,0,0.2); padding: 10px 20px; border-radius: 50px;">👉 TOCAR PANTALLA PARA RECONOCER 👈</span>
    </div>

    <div class="app-lienzo">
        <div id="seccion-agenda" class="contenedor activa">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo%20mi%20agenda.png" class="img-titulo" alt="Mi Agenda">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel3.png" class="img-puntos">
            
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_crearsucursal.png" class="btn-img" onclick="mostrarPantallaSucursales()">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_configurarhorarios.png" class="btn-img" onclick="mostrarPantallaHorarios()">
            
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_bloquear.png" class="btn-img" onclick="mostrarPanelBloqueo()">
            
            <div id="panel-bloqueo" class="caja-blanca" style="display:none; padding:20px;">
                <label style="color: #333 !important; text-shadow: none !important;">Fecha a bloquear</label>
                <input type="date" id="bloq-fecha" style="background: #F0F0F0; color:#333; margin-bottom:10px;">
                
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <div style="flex:1">
                        <label style="color: #333 !important; text-shadow: none !important;">Desde</label>
                        <input type="time" id="bloq-hora-desde" style="background: #F0F0F0; color:#333; margin-bottom:0;">
                    </div>
                    <div style="flex:1">
                        <label style="color: #333 !important; text-shadow: none !important;">Hasta</label>
                        <input type="time" id="bloq-hora-hasta" style="background: #F0F0F0; color:#333; margin-bottom:0;">
                    </div>
                </div>

                <div style="display:flex; gap:10px;">
                    <button onclick="ejecutarBloqueo()" style="flex:1; background:#CEE800; color:#333; border:none; border-radius:15px; padding:12px; font-weight:900; cursor:pointer;">BLOQUEAR</button>
                    <button onclick="ocultarPanelBloqueo()" style="flex:1; background:#999; color:white; border:none; border-radius:15px; padding:12px; font-weight:900; cursor:pointer;">CANCELAR</button>
                </div>
            </div>

            <div style="width: 100%;">
                <label>Sucursal</label><select id="agenda-sucursal" onchange="cargarTurnos()"></select>
                
                <div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:8px;">
                    <label style="width:auto; margin-bottom:0;">Fecha</label>
                    <input type="date" id="agenda-fecha" style="width:auto; padding:5px 12px; margin-bottom:0; font-size:12px; border-radius:12px; font-weight:900;" onchange="seleccionarFechaDesdeInputNativo(this.value)">
                </div>
                
                <div class="carrusel-fechas" id="carrusel-fechas">
                    </div>
                <label style="color: #555; margin-bottom: 8px;">Turnos programados</label>
                <div class="caja-blanca"><div class="linea-verde"></div><div id="lista-turnos" style="margin-top: 5px;"></div></div>

                <label style="color: #555; margin-bottom: 8px;">Turnos cancelados</label>
                <div class="caja-blanca"><div class="linea-roja"></div><div id="lista-cancelados" style="margin-top: 5px;"></div></div>
            </div>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_cerrarsesion.png" class="btn-link-img" style="width: 45%; margin-top: 5px;" onclick="cerrarSesion()">
        </div>

        <div id="seccion-sucursales" class="contenedor">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo_missucursales.png" class="img-titulo" alt="Mis Sucursales"> 
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel5.png" class="img-puntos">
            <div style="width: 100%;">
                <label>Crear sucursal / Especialidad</label><input type="text" id="suc-nombre" placeholder="Nombre de la sucursal o Especialista">
                <input type="text" id="suc-dir" placeholder="Dirección o Consultorio" style="margin-top: -10px;">
                
                <label>Valor de la Seña ($)</label><input type="number" id="suc-valorseña" placeholder="Ej: 5000 (Poner 0 si es sin seña)" min="0">
                <label>Link de seña Mercado Pago</label><input type="text" id="suc-mp-link" placeholder="EJ: http://mpago.la/xxxxx">
            </div>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_guardar.png" class="btn-img" onclick="guardarOActualizarSucursal()">
            <div style="width: 100%; margin-top: 30px;">
                <label style="color: #7A7A7A; font-size: 14px; margin-bottom: 8px;">Modificar Sucursal</label>
                <select id="select-editar-sucursal" onchange="cargarDatosSucursalAEditar()"><option value="NUEVA">Elige la sucursal</option></select>
            </div>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_volveramiagenda.png" class="btn-link-img" onclick="mostrarPantallaAgenda()">
        </div>

        <div id="seccion-horarios" class="contenedor">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo_mishorarios.png" class="img-titulo">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel4.png" class="img-puntos">
            <div style="width: 100%;">
                <label>Seleccionar Sucursal</label><select id="hor-sucursal" onchange="cargarHorarios()"></select>
                <label>Día de la semana</label>
                <select id="hor-dia">
                    <option value="1">Lunes</option><option value="2">Martes</option><option value="3">Miércoles</option><option value="4">Jueves</option><option value="5">Viernes</option><option value="6">Sábado</option><option value="0">Domingo</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Desde</label><input type="time" id="hor-inicio" value="08:00"></div>
                    <div style="flex:1"><label>Hasta</label><input type="time" id="hor-fin" value="20:00"></div>
                </div>
                <label>Duración</label>
                <select id="hor-duracion"><option value="20">20 Minutos</option><option value="30" selected>30 Minutos</option><option value="60">60 Minutos</option></select>
            </div>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_configurarhorarios.png" class="btn-img" style="display:none;">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_asignarhorarios.png" class="btn-img" onclick="guardarHorario()">
            
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_vacaciones.png" class="btn-img" onclick="mostrarPanelVacaciones()">
            
            <div id="panel-vacaciones" class="caja-blanca" style="display:none; padding:20px;">
                <label style="color: #333 !important; text-shadow: none !important;">Vacaciones Desde (inclusive)</label>
                <input type="date" id="vac-desde" style="background: #F0F0F0; color:#333; margin-bottom:10px;">
                <label style="color: #333 !important; text-shadow: none !important;">Vacaciones Hasta (inclusive)</label>
                <input type="date" id="vac-hasta" style="background: #F0F0F0; color:#333; margin-bottom:15px;">
                <div style="display:flex; gap:10px;">
                    <button onclick="ejecutarVacaciones()" style="flex:1; background:#CEE800; color:#333; border:none; border-radius:15px; padding:12px; font-weight:900; cursor:pointer;">GUARDAR</button>
                    <button onclick="ocultarPanelVacaciones()" style="flex:1; background:#999; color:white; border:none; border-radius:15px; padding:12px; font-weight:900; cursor:pointer;">CANCELAR</button>
                </div>
            </div>

            <div style="width: 100%; margin-top: 15px;"><label>Mis Horarios</label><div class="caja-blanca"><div id="lista-horarios"></div></div></div>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_volveramiagenda.png" class="btn-link-img" onclick="mostrarPantallaAgenda()">
        </div>
    </div>

    <script>
        // 🔄 MATA FANTASMAS AUTOMÁTICO PARA LA PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.update();
                }
            });
        }

        const SUPABASE_URL = 'https://mvvfkmlgnmkvwnuvtryh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbm1rdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM2ODcsImV4cCI6MjA5NTgxOTY4N30.2HG0ZWeEIpMKdi2RNqlqY_bcK99DiRwpEkN-eHVjSe0';
        const supabaseCliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const idMedico = localStorage.getItem('mi_turno_negocio_id'); 

        if (!idMedico) {
            alert("Tu sesión expiró."); window.location.href = "panel.html";
        }

        // --- LÓGICA DEL CARRUSEL DE FECHAS ---
        function generarCarruselFechas(fechaSeleccionadaStr) {
            const contenedor = document.getElementById('carrusel-fechas');
            contenedor.innerHTML = '';
            
            const diasAtras = 5;  
            const totalDias = 30; 
            const diasSemana = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            
            let html = '';
            let idActivo = '';
            
            for(let i = -diasAtras; i < (totalDias - diasAtras); i++) {
                let d = new Date();
                d.setDate(d.getDate() + i);
                
                let fechaIso = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
                let nombreDia = diasSemana[d.getDay()];
                let numeroDia = d.getDate();
                
                let claseActivo = (fechaIso === fechaSeleccionadaStr) ? 'activo' : '';
                if(claseActivo) idActivo = `globo-${fechaIso}`;
                
                html += `
                    <div id="globo-${fechaIso}" class="dia-globo ${claseActivo}" onclick="seleccionarFechaCarrusel('${fechaIso}')">
                        <span class="nombre-dia">${nombreDia}</span>
                        <span class="numero-dia">${numeroDia}</span>
                    </div>
                `;
            }
            contenedor.innerHTML = html;
            
            setTimeout(() => {
                const activo = document.getElementById(idActivo);
                if(activo) {
                    activo.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            }, 50);
        }

        function seleccionarFechaCarrusel(fechaIso) {
            document.getElementById('agenda-fecha').value = fechaIso;
            generarCarruselFechas(fechaIso);
            cargarTurnos();
        }

        function seleccionarFechaDesdeInputNativo(fechaIso) {
            if(!fechaIso) return;
            generarCarruselFechas(fechaIso);
            cargarTurnos();
        }
        // --- FIN LÓGICA CARRUSEL ---

        const hoyLocalIso = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('agenda-fecha').value = hoyLocalIso;
        generarCarruselFechas(hoyLocalIso);

        async function init() { await cargarSelectores(); activarCanalTiempoRealProfesional(); }
        function mostrarPantallaSucursales() { switchSeccion('seccion-sucursales'); }
        function mostrarPantallaHorarios() { switchSeccion('seccion-horarios'); cargarSelectores(); }
        function mostrarPantallaAgenda() { switchSeccion('seccion-agenda'); cargarSelectores(); }
        
        function switchSeccion(id) { 
            document.querySelectorAll('.contenedor').forEach(c => c.classList.remove('activa')); 
            document.getElementById(id).classList.add('activa'); 
            document.querySelector('.app-lienzo').scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        async function cargarSelectores() {
            if (!idMedico) return;
            const { data } = await supabaseCliente.from('sucursales').select('*').eq('negocio_id', idMedico).order('nombre');
            const opcionesSedes = data?.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('') || '';
            document.getElementById('agenda-sucursal').innerHTML = opcionesSedes || '<option value="">Crea una sucursal primero</option>';
            document.getElementById('hor-sucursal').innerHTML = opcionesSedes || '<option value="">Crea una sucursal primero</option>';
            document.getElementById('select-editar-sucursal').innerHTML = '<option value="NUEVA">Elige la sucursal</option>' + opcionesSedes;
            cargarTurnos(); cargarHorarios();
        }

        async function cargarDatosSucursalAEditar() {
            const idSucElegida = document.getElementById('select-editar-sucursal').value;
            if (idSucElegida === 'NUEVA') {
                document.getElementById('suc-nombre').value = ''; document.getElementById('suc-dir').value = ''; document.getElementById('suc-mp-link').value = ''; document.getElementById('suc-valorseña').value = '';
            } else {
                const { data } = await supabaseCliente.from('sucursales').select('*').eq('id', idSucElegida).single();
                if (data) {
                    document.getElementById('suc-nombre').value = data.nombre; 
                    document.getElementById('suc-dir').value = data.direccion || ''; 
                    document.getElementById('suc-mp-link').value = data.link_mercadopago || '';
                    document.getElementById('suc-valorseña').value = data.valor_senia !== undefined ? data.valor_senia : '';
                }
            }
        }

        async function guardarOActualizarSucursal() {
            const idSucElegida = document.getElementById('select-editar-sucursal').value;
            const nombre = document.getElementById('suc-nombre').value.trim(); 
            const direccion = document.getElementById('suc-dir').value.trim(); 
            const mpLink = document.getElementById('suc-mp-link').value.trim();
            const valorSeniaInput = document.getElementById('suc-valorseña').value;
            const valorSenia = valorSeniaInput === '' ? 0 : parseFloat(valorSeniaInput);

            if(!nombre || !direccion) return alert("Por favor, completá el nombre y la dirección.");
            
            if (idSucElegida === 'NUEVA') {
                const { count } = await supabaseCliente
                    .from('sucursales')
                    .select('*', { count: 'exact', head: true })
                    .eq('negocio_id', idMedico);
                    
                if (count >= 2) {
                    alert("⚠️ LÍMITE DE PLAN ALCANZADO\n\nLlegaste al límite de 2 sucursales/profesionales de tu plan Básico.");
                    return;
                }

                const { error } = await supabaseCliente.from('sucursales').insert([{ negocio_id: idMedico, nombre, direccion, link_mercadopago: mpLink, valor_senia: valorSenia }]);
                if (error) return alert("Error al guardar: " + error.message);
                
                alert("✅ ¡Sucursal creada con éxito!");
            } else {
                const { error } = await supabaseCliente.from('sucursales').update({ nombre, direccion, link_mercadopago: mpLink, valor_senia: valorSenia }).eq('id', idSucElegida);
                if (error) return alert("Error al actualizar: " + error.message);
                
                alert("✅ ¡Sucursal modificada con éxito!");
            }
            
            document.getElementById('select-editar-sucursal').value = 'NUEVA'; 
            document.getElementById('suc-nombre').value = ''; 
            document.getElementById('suc-dir').value = ''; 
            document.getElementById('suc-mp-link').value = ''; 
            document.getElementById('suc-valorseña').value = '';
            
            await cargarSelectores();
        }

        async function guardarHorario() {
            const idSuc = document.getElementById('hor-sucursal').value;
            const dia = document.getElementById('hor-dia').value; let ini = document.getElementById('hor-inicio').value; let fin = document.getElementById('hor-fin').value; const duracion = document.getElementById('hor-duracion').value;
            if(ini.length === 5) ini += ":00"; if(fin.length === 5) fin += ":00";
            await supabaseCliente.from('configuracion_agenda').insert([{ negocio_id: idMedico, sucursal_id: idSuc, dia_semana: parseInt(dia), hora_inicio: ini, hora_fin: fin, duracion_minutos: parseInt(duracion), cupo_maximo: 1 }]);
            alert("¡Horario asignado!"); await cargarHorarios();
        }

        async function cargarHorarios() {
            const idSuc = document.getElementById('hor-sucursal').value; if(!idSuc) return;
            const { data } = await supabaseCliente.from('configuracion_agenda').select('*').eq('sucursal_id', idSuc);
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            document.getElementById('lista-horarios').innerHTML = data?.map(h => `<div class="item-turno"><div style="display:flex; justify-content:space-between; width:100%;"><div>${dias[h.dia_semana]} <small>${h.hora_inicio.slice(0,5)} a ${h.hora_fin.slice(0,5)} hs</small></div><button class="btn-borrar-horario" onclick="eliminarHorario('${h.id}')">🗑️</button></div></div>`).join('') || '<p style="text-align:center; color:#A0A0A0; font-size:13px; margin:0;">Sin horarios.</p>';
        }

        async function eliminarHorario(idHorario) {
            if(confirm("¿Borrar franja?")) { await supabaseCliente.from('configuracion_agenda').delete().eq('id', idHorario); cargarHorarios(); }
        }

        function mostrarPanelBloqueo() {
            document.getElementById('panel-bloqueo').style.display = 'block';
            document.getElementById('bloq-fecha').value = document.getElementById('agenda-fecha').value;
        }

        function ocultarPanelBloqueo() {
            document.getElementById('panel-bloqueo').style.display = 'none';
            document.getElementById('bloq-hora-desde').value = '';
            document.getElementById('bloq-hora-hasta').value = '';
        }

        async function ejecutarBloqueo() {
            const idSuc = document.getElementById('agenda-sucursal').value;
            const fecha = document.getElementById('bloq-fecha').value;
            const horaDesde = document.getElementById('bloq-hora-desde').value;
            const horaHasta = document.getElementById('bloq-hora-hasta').value;
            
            if(!idSuc || !fecha || !horaDesde || !horaHasta) return alert("Completá todos los campos (Fecha, Desde y Hasta) para bloquear.");
            
            let [hDesde, mDesde] = horaDesde.split(':').map(Number);
            let [hHasta, mHasta] = horaHasta.split(':').map(Number);
            let tiempoActual = hDesde * 60 + mDesde;
            let tiempoFin = hHasta * 60 + mHasta;

            if (tiempoActual >= tiempoFin) return alert("La hora 'Hasta' debe ser mayor a la hora 'Desde'.");

            const diaSemana = new Date(fecha + "T00:00:00").getDay();
            const { data: configs } = await supabaseCliente.from('configuracion_agenda')
                .select('duracion_minutos')
                .eq('sucursal_id', idSuc)
                .eq('dia_semana', diaSemana)
                .limit(1);

            let intervalo = (configs && configs.length > 0 && configs[0].duracion_minutos > 0) ? configs[0].duracion_minutos : 30;

            let inserts = [];
            
            while (tiempoActual < tiempoFin) {
                let h = Math.floor(tiempoActual / 60).toString().padStart(2, '0');
                let m = (tiempoActual % 60).toString().padStart(2, '0');
                
                inserts.push({
                    negocio_id: idMedico,
                    sucursal_id: idSuc,
                    fecha: fecha,
                    hora: `${h}:${m}:00`,
                    cliente_nombre: '🚫 HORARIO BLOQUEADO',
                    cliente_telefono: '',
                    estado: 'bloqueado'
                });
                
                tiempoActual += intervalo;
            }
            
            const { error } = await supabaseCliente.from('turnos_activos').insert(inserts);
            
            if (error) return alert("Error al bloquear: " + error.message);
            
            ocultarPanelBloqueo();
            cargarTurnos();
            alert("✅ ¡Franja horaria bloqueada con éxito!");
        }

        function mostrarPanelVacaciones() {
            document.getElementById('panel-vacaciones').style.display = 'block';
        }

        function ocultarPanelVacaciones() {
            document.getElementById('panel-vacaciones').style.display = 'none';
            document.getElementById('vac-desde').value = '';
            document.getElementById('vac-hasta').value = '';
        }

        async function ejecutarVacaciones() {
            const idSuc = document.getElementById('hor-sucursal').value;
            const fechaDesde = document.getElementById('vac-desde').value;
            const fechaHasta = document.getElementById('vac-hasta').value;
            
            if(!idSuc || !fechaDesde || !fechaHasta) return alert("Por favor, completá ambos días para cargar las vacaciones.");
            
            let desde = new Date(fechaDesde + "T00:00:00");
            let hasta = new Date(fechaHasta + "T00:00:00");
            
            if(desde > hasta) return alert("La fecha de inicio no puede ser posterior a la fecha de fin.");

            let inserts = [];
            let loop = new Date(desde);
            
            while(loop <= hasta){
                let fIso = loop.toISOString().split('T')[0];
                inserts.push({
                    negocio_id: idMedico,
                    sucursal_id: idSuc,
                    fecha: fIso,
                    hora: '00:00:00',
                    cliente_nombre: '✈️ VACACIONES',
                    cliente_telefono: '',
                    estado: 'vacaciones'
                });
                loop.setDate(loop.getDate() + 1);
            }
            
            await supabaseCliente.from('turnos_activos').insert(inserts);
            alert("¡Fechas de vacaciones guardadas exitosamente!");
            ocultarPanelVacaciones();
            
            if(document.getElementById('seccion-agenda').classList.contains('activa')){
                cargarTurnos();
            }
        }

        async function desbloquearHorario(idTurno) {
            if(confirm("¿Querés desbloquear este horario/día para que vuelva a estar disponible?")) {
                await supabaseCliente.from('turnos_activos').delete().eq('id', idTurno);
                cargarTurnos();
            }
        }

        async function cancelarTurnoProfesional(idTurno, telefono, nombre, fecha, hora) {
            if(!confirm("¿Estás seguro de que querés cancelar este turno? Se enviará un WhatsApp al cliente.")) return;

            await supabaseCliente.from('turnos_activos').update({ estado: 'cancelado_por_profesional' }).eq('id', idTurno);
            
            const mensaje = encodeURIComponent(`Hola ${nombre}, te pedimos disculpas pero tuvimos que cancelar tu turno del día ${fecha} a las ${hora.slice(0,5)}hs. Por favor, escribinos para reprogramarlo. ¡Gracias!`);
            
            if(telefono && telefono.trim() !== '') {
                window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank');
            } else {
                alert("El turno fue cancelado en el sistema, pero el cliente no dejó un teléfono válido para avisarle por WhatsApp.");
            }
            
            cargarTurnos();
        }

        async function cargarTurnos() {
            const idSuc = document.getElementById('agenda-sucursal').value; 
            const fecha = document.getElementById('agenda-fecha').value;
            if(!idSuc || !fecha) return;

            let valorSenia = 0;
            let linkMp = '';

            try {
                const { data: datosSucursal } = await supabaseCliente
                    .from('sucursales')
                    .select('valor_senia, link_mercadopago')
                    .eq('id', idSuc)
                    .maybeSingle();

                if (datosSucursal) {
                    valorSenia = parseFloat(datosSucursal.valor_senia) || 0;
                    linkMp = datosSucursal.link_mercadopago || '';
                }
            } catch (e) {
                console.log("Error consultando seña:", e);
            }

            const { data: turnos } = await supabaseCliente.from('turnos_activos').select('*').eq('sucursal_id', idSuc).eq('fecha', fecha).order('hora');
            let activosHtml = ''; 
            let canceladosHtml = '';
            
            turnos?.forEach(t => {
                const esCancelado = t.estado.startsWith('cancelado'); 
                const esEnEspera = t.estado === 'en_espera';
                const esBloqueado = t.estado === 'bloqueado';
                const esVacaciones = t.estado === 'vacaciones';
                
                if (esVacaciones) {
                    activosHtml += `
                        <div class="item-turno" style="width: 100% !important; box-sizing: border-box !important; margin-bottom: 15px !important; background: #E0F7FA !important; padding: 15px !important; border-radius: 12px !important; border: 2px dashed #009E9B !important;">
                            <div style="text-align:center !important; width:100% !important;">
                                <strong style="color: #009E9B !important; font-size:18px; display:block; margin-bottom:5px;">✈️ DÍA DE VACACIONES</strong>
                                <span style="font-size:12px; color:#555;">La agenda está cerrada para este día completo.</span>
                                <button onclick="desbloquearHorario('${t.id}')" style="background: #ED3237 !important; color: white !important; border: none !important; padding: 10px !important; border-radius: 10px !important; margin-top: 15px !important; font-weight: 900 !important; cursor: pointer !important; width: 100% !important;">REABRIR AGENDA PARA ESTE DÍA</button>
                            </div>
                        </div>
                    `;
                    return; 
                }

                let badgeText = 'CONFIRMADO'; 
                let badgeClass = 'ok';
                
                if (esCancelado) { 
                    badgeText = 'CANCELADO'; 
                    badgeClass = 'cancel'; 
                } else if (esEnEspera) { 
                    badgeText = '🛋️ EN SALA'; 
                    badgeClass = 'waiting'; 
                } else if (esBloqueado) {
                    badgeText = '🔒 BLOQUEADO';
                    badgeClass = 'block';
                }
                
                let seccionPagoHtml = '';
                if (!esCancelado && !esBloqueado) {
                    if (valorSenia > 0) {
                        seccionPagoHtml = `
                            <div style="background-color: #FFF3CD !important; border: 2px dashed #F4B41A !important; border-radius: 12px !important; padding: 12px !important; margin: 12px 0 8px 0 !important; text-align: center !important; width: 100% !important; box-sizing: border-box !important; display: block !important;">
                                <span style="color: #856404 !important; font-weight: 900 !important; font-size: 13px !important; display: block !important; text-transform: uppercase !important; font-family: 'Nunito', sans-serif !important;">
                                    ⚠️ El turno se confirmará una vez que pagues la seña
                                </span>
                            </div>
                            <a href="${linkMp}" target="_blank" style="text-decoration: none !important; width: 100% !important; display: block !important;">
                                <button style="width: 100% !important; background-color: #F4B41A !important; color: white !important; font-weight: 900 !important; padding: 14px !important; border-radius: 20px !important; border: none !important; cursor: pointer !important; text-transform: uppercase !important; font-size: 13px !important; font-family: 'Nunito', sans-serif !important; box-shadow: 0 4px 6px rgba(0,0,0,0.1) !important;">
                                    💳 Pagar Seña ($${valorSenia})
                                </button>
                            </a>
                        `;
                    } else {
                        seccionPagoHtml = `
                            <div style="background-color: #E2F0D9 !important; border: 1px solid #6EB64F !important; border-radius: 12px !important; padding: 10px !important; margin: 12px 0 8px 0 !important; text-align: center !important; width: 100% !important; box-sizing: border-box !important; display: block !important;">
                                <span style="color: #385723 !important; font-weight: 800 !important; font-size: 12px !important; display: block !important; font-family: 'Nunito', sans-serif !important;">
                                    ✅ Reserva Confirmada (Sin Seña)
                                </span>
                            </div>
                        `;
                    }
                }

                let botonesAccionHtml = '';
                if (!esCancelado && !esBloqueado && !esEnEspera) {
                    botonesAccionHtml = `
                        <button onclick="cancelarTurnoProfesional('${t.id}', '${t.cliente_telefono}', '${t.cliente_nombre}', '${t.fecha}', '${t.hora}')" style="background: #ED3237 !important; color: white !important; border: none !important; padding: 10px !important; border-radius: 10px !important; margin-top: 10px !important; font-weight: 900 !important; font-family: 'Nunito', sans-serif !important; cursor: pointer !important; width: 100% !important;">🚫 CANCELAR TURNO</button>
                    `;
                } else if (esBloqueado) {
                    botonesAccionHtml = `
                        <button onclick="desbloquearHorario('${t.id}')" style="background: #555 !important; color: white !important; border: none !important; padding: 10px !important; border-radius: 10px !important; margin-top: 10px !important; font-weight: 900 !important; font-family: 'Nunito', sans-serif !important; cursor: pointer !important; width: 100% !important;">🔓 DESBLOQUEAR HORARIO</button>
                    `;
                }

                const card = `
                    <div class="item-turno" style="width: 100% !important; box-sizing: border-box !important; margin-bottom: 15px !important; background: #FFFFFF !important; padding: 12px !important; border-radius: 12px !important; box-shadow: 0 2px 8px rgba(0,0,0,0.04) !important;">
                        <div style="display: flex !important; justify-content: space-between !important; align-items: center !important; width: 100% !important;">
                            <div>
                                <strong style="color: #333 !important;">[${t.hora.slice(0,5)}]</strong> ${t.cliente_nombre || 'Paciente'}
                                ${!esBloqueado ? `<small style="color: #666 !important; display: block !important; margin-top: 2px !important;">Tel: ${t.cliente_telefono || ''}</small>` : ''}
                            </div>
                            <span class="badge ${badgeClass}">${badgeText}</span>
                        </div>
                        ${seccionPagoHtml}
                        ${botonesAccionHtml}
                    </div>
                `;
                
                if(esCancelado) canceladosHtml += card; else activosHtml += card;
            });
            
            document.getElementById('lista-turnos').innerHTML = activosHtml || '<p style="margin:0; text-align:center; color:#999;">No hay turnos.</p>';
            document.getElementById('lista-cancelados').innerHTML = canceladosHtml || '<p style="margin:0; text-align:center; color:#999;">Sin cancelaciones.</p>';
        }

        function cerrarSesion() { localStorage.removeItem('mi_turno_negocio_id'); window.location.href = "panel.html"; }

        let intervaloSonoro = null; let audioCtx = null;
        function reproducirTimbreCampana() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } catch(e) {}
        }
        function iniciarAlertaVisualYSonora(nombrePaciente) {
            document.getElementById('nombre-paciente-espera').innerText = nombrePaciente;
            const modal = document.getElementById('alerta-sala-espera');
            modal.style.display = 'flex'; modal.classList.add('estrobo-activo');
            reproducirTimbreCampana(); intervaloSonoro = setInterval(reproducirTimbreCampana, 1500);
        }
        function silenciarAlertaEspera() {
            const modal = document.getElementById('alerta-sala-espera');
            modal.style.display = 'none'; modal.classList.remove('estrobo-activo');
            if(intervaloSonoro) clearInterval(intervaloSonoro);
            cargarTurnos();
        }
        function activarCanalTiempoRealProfesional() {
            if (!idMedico) return;
            const hoyArg = new Date(new Date().getTime() - (new Date().getTimezoneOffset() * 60 * 1000)).toISOString().split('T')[0];
            supabaseCliente.channel('sala-espera-channel-med-real')
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'turnos_activos', filter: `negocio_id=eq.${idMedico}` }, (payload) => {
                    const tMod = payload.new;
                    if (tMod && tMod.estado === 'en_espera' && tMod.fecha === hoyArg) { iniciarAlertaVisualYSonora(tMod.cliente_nombre); }
                }).subscribe();
        }
        init();
    </script>
</body>
</html>

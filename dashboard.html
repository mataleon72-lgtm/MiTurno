<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Gestión - Mi Turno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* FONDO GRIS Y LIENZO PRINCIPAL (Igual que el panel.html) */
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #F8F8F8; 
            margin: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
        }

        .app-lienzo {
            position: relative;
            width: 100%;
            max-width: 432px;
            height: 960px; /* Tamaño exacto de tu diseño */
            background-image: url('https://mataleon72-lgtm.github.io/MiTurno/lienzo_panel.png');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow-y: auto; /* Permite hacer scroll si hay muchos turnos */
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Pantalla de carga con video */
        #splash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #F8F8F8;
            z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.4s ease;
            cursor: pointer;
        }
        #splash-screen video { width: 100%; height: 100%; object-fit: cover; }

        /* CONTENEDORES DE LAS SECCIONES */
        .contenedor { 
            width: 85%; 
            padding-top: 110px; /* Margen para no pisar la trama del fondo */
            padding-bottom: 50px;
            display: none; 
            flex-direction: column;
            align-items: center;
        }
        .contenedor.activa { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* IMÁGENES DEL DISEÑO (Títulos, botones y puntos) */
        .img-titulo { width: 95%; margin-bottom: 5px; } 
        .img-puntos { width: 30%; margin-bottom: 25px; } 
        .btn-img { width: 85%; margin-bottom: 15px; cursor: pointer; transition: transform 0.2s; }
        .btn-img:active { transform: scale(0.96); }

        /* CAJAS BLANCAS Y FORMULARIOS MODERNOS */
        .caja-blanca { 
            width: 100%; background: #FFFFFF; border-radius: 20px; padding: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.06); margin-bottom: 20px; box-sizing: border-box;
        }
        label { 
            font-weight: 800; color: #7A7A7A; font-size: 13px; 
            width: 100%; text-align: left; padding-left: 5px; margin-bottom: 5px; display: block;
        }
        input, select { 
            width: 100%; padding: 14px 15px; border-radius: 15px; border: none; 
            background: #F8F8F8;
            box-shadow: inset 0px 2px 5px rgba(0,0,0,0.03); 
            margin-bottom: 18px; box-sizing: border-box; font-size: 15px; font-weight: 800; color: #555; font-family: 'Nunito', sans-serif; outline: none;
        }
        input:focus, select:focus { background: #FFFFFF; box-shadow: 0px 4px 12px rgba(0, 158, 155, 0.2); }

        /* LISTAS DE TURNOS */
        .item-lista {
            background: #F8F8F8; padding: 14px; border-radius: 10px; margin-bottom: 8px;
            font-weight: 900; color: #444; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid #009E9B; font-size: 14px;
        }
        .item-lista small { color: #888; display: block; font-size: 12px; font-weight: 800; margin-top: 2px; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; color: white; font-weight: 900; }
        .badge.ok { background: #009E9B; }
        .badge.wait { background: #F4B41A; }
        .badge.cancel { background: #D9534F; }

        /* SECCIÓN 3 TEMPORAL (Para que no se rompa mientras armamos la 1 y 2) */
        .btn-amarillo { background: #F4B41A; color: white; border: none; border-radius: 12px; padding: 15px; font-weight: 900; font-size: 16px; width: 100%; cursor: pointer; margin-bottom: 15px; }
        .contenedor-con-fondo { background: #009E9B; border-radius: 30px; padding: 30px 20px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .contenedor-con-fondo h2 { color: #FFFFFF; text-align: center; margin-top: 0; font-size: 24px; }
        .contenedor-con-fondo label { color: #FFFFFF; }
        .btn-borrar-horario { background: none; border: none; color: #D9534F; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-lienzo">
        
        <div id="splash-screen">
            <video id="intro-video" src="https://mataleon72-lgtm.github.io/MiTurno/intro.mp4" autoplay muted playsinline></video>
        </div>

        <div id="seccion-agenda" class="contenedor activa">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/titulo%20mi%20agenda.png" class="img-titulo" alt="Mi Agenda">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel3.png" class="img-puntos">
            
            <div class="caja-blanca">
                <label>Sucursal de atención</label>
                <select id="agenda-sucursal" onchange="cargarTurnos()"></select>
                <label>Fecha</label>
                <input type="date" id="agenda-fecha" onchange="cargarTurnos()">
            </div>
            
            <div class="caja-blanca">
                <label>Turnos programados:</label>
                <div id="lista-turnos"></div>
            </div>

            <div class="caja-blanca" style="background: #FFF5F5; border: 1px solid #FFD2D2;">
                <label style="color: #D9534F;">Turnos Cancelados con Aviso:</label>
                <div id="lista-cancelados"></div>
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_crearsucursal.png" class="btn-img" onclick="mostrarPantallaConsultorios()">
            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_configurarhorarios.png" class="btn-img" onclick="mostrarPantallaHorarios()">
            
            <p onclick="cerrarSesion()" style="text-align:center; color:#888; text-decoration:underline; font-size:14px; cursor:pointer; margin-top: 15px; font-weight: 800;">Cerrar Sesión</p>
        </div>

        <div id="seccion-sucursales" class="contenedor">
            <h2 style="color: #444; font-weight: 900; margin-bottom: 5px;">Configurar Sede</h2>
            <img src="https://mataleon72-lgtm.github.io/MiTurno/puntos_panel5.png" class="img-puntos">
            
            <div class="caja-blanca" style="border: 2px solid #009E9B;">
                <label style="color: #009E9B;">⚙ Modificar Sede Existente</label>
                <select id="select-editar-sucursal" onchange="cargarDatosSedeAEditar()">
                    <option value="NUEVA">-- Crear Nueva Sucursal (Vacío) --</option>
                </select>
            </div>

            <div class="caja-blanca">
                <h3 id="titulo-operacion-suc" style="margin-top:0; color:#007D82; font-weight:900;">Crear Nueva Sucursal</h3>
                <label>Nombre de la Sede</label>
                <input type="text" id="suc-nombre" placeholder="Ej: Consultorio Centro">
                <label>Dirección Completa</label>
                <input type="text" id="suc-dir" placeholder="Ej: Av. Rivadavia 1420">
                <label style="color: #F4B41A;">Link de Mercado Pago para esta Sede</label>
                <input type="text" id="suc-mp-link" placeholder="Ej: https://mpago.la/xxxxxx">
                
                <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_guardar.png" class="btn-img" style="width: 100%; margin-top: 10px;" onclick="guardarOActualizarSucursal()">
            </div>

            <img src="https://mataleon72-lgtm.github.io/MiTurno/boton_volveramiagenda.png" class="btn-img" onclick="mostrarPantallaAgenda()">
        </div>

        <div id="seccion-horarios" class="contenedor">
            <div class="contenedor-con-fondo">
                <h2>Mis Horarios</h2>
                <label>Seleccioná Sucursal</label>
                <select id="hor-sucursal" onchange="cargarHorarios()"></select>
                <label>Día de la semana</label>
                <select id="hor-dia">
                    <option value="1">Lunes</option><option value="2">Martes</option>
                    <option value="3">Miércoles</option><option value="4">Jueves</option>
                    <option value="5">Viernes</option><option value="6">Sábado</option>
                    <option value="0">Domingo</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>Desde</label><input type="time" id="hor-inicio" value="14:00"></div>
                    <div style="flex:1"><label>Hasta</label><input type="time" id="hor-fin" value="19:00"></div>
                </div>
                <label>Duración de turno</label>
                <select id="hor-duracion">
                    <option value="20">20 min</option><option value="30" selected>30 min</option>
                    <option value="40">40 min</option><option value="60">60 min</option>
                </select>
                <button class="btn-amarillo" onclick="guardarHorario()">Asignar Horario</button>
            </div>
            <div class="caja-blanca" style="margin-top: 20px; width: 100%;">
                <label>Esquema de atención:</label>
                <div id="lista-horarios"></div>
            </div>
            <button class="btn-amarillo" style="background:#009E9B" onclick="mostrarPantallaAgenda()">Volver a mi Agenda</button>
        </div>

    </div>

    <script>
        // LOGICA DEL VIDEO SPLASH 
        document.addEventListener("DOMContentLoaded", () => {
            const video = document.getElementById('intro-video');
            const splash = document.getElementById('splash-screen');
            let videoTerminado = false;
            const ocultarSplash = () => {
                if (videoTerminado) return;
                videoTerminado = true;
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.display = 'none'; video.pause(); }, 400); 
            };
            video.addEventListener('ended', ocultarSplash);
            splash.addEventListener('click', ocultarSplash);
            setTimeout(ocultarSplash, 3500); 
        });

        const SUPABASE_URL = 'https://mvvfkmlgnmkvwnuvtryh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbm1rdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM2ODcsImV4cCI6MjA5NTgxOTY4N30.2HG0ZWeEIpMKdi2RNqlqY_bcK99DiRwpEkN-eHVjSe0';
        const supabaseCliente = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const idMedico = localStorage.getItem('mi_turno_negocio_id'); 

        if (!idMedico) {
            alert("Tu sesión expiró. Volvé a ingresar desde el panel.");
            window.location.href = "panel.html";
        }

        document.getElementById('agenda-fecha').value = new Date().toISOString().split('T')[0];

        async function init() {
            await cargarSelectores();
        }

        function mostrarPantallaConsultorios() { switchSeccion('seccion-sucursales'); }
        function mostrarPantallaHorarios() { switchSeccion('seccion-horarios'); cargarSelectores(); }
        function mostrarPantallaAgenda() { switchSeccion('seccion-agenda'); cargarSelectores(); }
        function switchSeccion(id) { document.querySelectorAll('.contenedor').forEach(c => c.classList.remove('activa')); document.getElementById(id).classList.add('activa'); document.querySelector('.app-lienzo').scrollTo(0,0); }

        async function cargarSelectores() {
            const { data } = await supabaseCliente.from('sucursales').select('*').eq('negocio_id', idMedico).order('nombre');
            
            const opcionesSedes = data?.map(s => `<option value="${s.id}">${s.nombre}</option>`).join('') || '';
            document.getElementById('agenda-sucursal').innerHTML = opcionesSedes || '<option value="">Crea una sucursal primero</option>';
            document.getElementById('hor-sucursal').innerHTML = opcionesSedes || '<option value="">Crea una sucursal primero</option>';
            document.getElementById('select-editar-sucursal').innerHTML = '<option value="NUEVA">-- Crear Nueva Sucursal (Vacío) --</option>' + opcionesSedes;

            cargarTurnos();
            cargarHorarios();
        }

        async function cargarDatosSedeAEditar() {
            const idSucElegida = document.getElementById('select-editar-sucursal').value;
            if (idSucElegida === 'NUEVA') {
                document.getElementById('titulo-operacion-suc').innerText = "Crear Nueva Sucursal";
                document.getElementById('suc-nombre').value = '';
                document.getElementById('suc-dir').value = '';
                document.getElementById('suc-mp-link').value = '';
                // Se anuló el cambio de texto del botón porque ahora es una imagen
            } else {
                const { data } = await supabaseCliente.from('sucursales').select('*').eq('id', idSucElegida).single();
                if (data) {
                    document.getElementById('titulo-operacion-suc').innerText = "Modificar " + data.nombre;
                    document.getElementById('suc-nombre').value = data.nombre;
                    document.getElementById('suc-dir').value = data.direccion || '';
                    document.getElementById('suc-mp-link').value = data.link_mercadopago || '';
                    // Se anuló el cambio de texto del botón porque ahora es una imagen
                }
            }
        }

        async function guardarOActualizarSucursal() {
            const idSucElegida = document.getElementById('select-editar-sucursal').value;
            const nombre = document.getElementById('suc-nombre').value.trim();
            const direccion = document.getElementById('suc-dir').value.trim();
            const mpLink = document.getElementById('suc-mp-link').value.trim();

            if(!nombre || !direccion) return alert("Completá el Nombre y la Dirección");

            if (idSucElegida === 'NUEVA') {
                await supabaseCliente.from('sucursales').insert([{ negocio_id: idMedico, nombre, direccion, link_mercadopago: mpLink }]);
                alert("¡Sucursal creada con éxito!");
            } else {
                await supabaseCliente.from('sucursales').update({ nombre, direccion, link_mercadopago: mpLink }).eq('id', idSucElegida);
                alert("¡Datos actualizados con éxito en Supabase!");
            }

            document.getElementById('select-editar-sucursal').value = 'NUEVA';
            document.getElementById('suc-nombre').value = '';
            document.getElementById('suc-dir').value = '';
            document.getElementById('suc-mp-link').value = '';
            document.getElementById('titulo-operacion-suc').innerText = "Crear Nueva Sucursal";
            
            await cargarSelectores();
        }

        async function guardarHorario() {
            const idSuc = document.getElementById('hor-sucursal').value;
            if(!idSuc) return alert("Seleccioná una sucursal");
            const dia = document.getElementById('hor-dia').value;
            let ini = document.getElementById('hor-inicio').value;
            let fin = document.getElementById('hor-fin').value;
            const duracion = document.getElementById('hor-duracion').value;

            if(ini.length === 5) ini = ini + ":00";
            if(fin.length === 5) fin = fin + ":00";

            await supabaseCliente.from('configuracion_agenda').insert([{ negocio_id: idMedico, sucursal_id: idSuc, dia_semana: parseInt(dia), hora_inicio: ini, hora_fin: fin, duracion_minutos: parseInt(duracion), cupo_maximo: 1 }]);
            alert("¡Horario asignado con éxito!");
            await cargarHorarios();
        }

        async function cargarHorarios() {
            const idSuc = document.getElementById('hor-sucursal').value;
            if(!idSuc) return;
            const { data } = await supabaseCliente.from('configuracion_agenda').select('*').eq('sucursal_id', idSuc);
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            
            document.getElementById('lista-horarios').innerHTML = data?.map(h => `
                <div class="item-lista">
                    <div>${dias[h.dia_semana]} <small>${h.hora_inicio.slice(0,5)} a ${h.hora_fin.slice(0,5)} hs (${h.duracion_minutos} min)</small></div>
                    <button class="btn-borrar-horario" onclick="eliminarHorario('${h.id}')">🗑️</button>
                </div>
            `).join('') || '<p style="text-align:center; color:#888;">Sin horarios.</p>';
        }

        async function eliminarHorario(idHorario) {
            if(!confirm("¿Estás seguro de que querés borrar esta franja horaria?")) return;
            const { error } = await supabaseCliente.from('configuracion_agenda').delete().eq('id', idHorario);
            if(error) alert("Error: " + error.message);
            else cargarHorarios();
        }

        async function cargarTurnos() {
            const idSuc = document.getElementById('agenda-sucursal').value;
            const fecha = document.getElementById('agenda-fecha').value;
            if(!idSuc || !fecha) return;

            const quinceMinutosAtras = new Date(Date.now() - 15 * 60 * 1000).toISOString();
            await supabaseCliente.from('turnos_activos').delete().eq('estado', 'pendiente').lt('creado_at', quinceMinutosAtras);

            const { data: turnos } = await supabaseCliente.from('turnos_activos').select('*').eq('sucursal_id', idSuc).eq('fecha', fecha).order('hora');
            
            let activosHtml = '';
            let canceladosHtml = '';

            turnos?.forEach(t => {
                const esCancelado = t.estado === 'cancelado_por_paciente';
                const card = `
                    <div class="item-lista" style="border-left-color: ${esCancelado ? '#D9534F' : (t.estado === 'confirmado' ? '#009E9B' : '#F4B41A')}">
                        <div>[${t.hora.slice(0,5)}] ${t.cliente_nombre || 'Paciente'}<small>Tel: ${t.cliente_telefono || 'Sin especificar'}</small></div>
                        <span class="badge" style="background: ${esCancelado ? '#D9534F' : (t.estado === 'confirmado' ? '#009E9B' : '#F4B41A')}">${t.estado.toUpperCase()}</span>
                    </div>
                `;
                if(esCancelado) canceladosHtml += card;
                else activosHtml += card;
            });

            document.getElementById('lista-turnos').innerHTML = activosHtml || '<p style="text-align:center; color:#888;">No hay turnos agendados.</p>';
            document.getElementById('lista-cancelados').innerHTML = canceladosHtml || '<p style="text-align:center; color:#888;">Sin cancelaciones.</p>';
        }

        function cerrarSesion() { localStorage.removeItem('mi_turno_negocio_id'); window.location.href = "panel.html"; }
        init();
    </script>
</body>
</html>

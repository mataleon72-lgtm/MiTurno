<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Turno App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h1 id="nombre-negocio" class="text-2xl font-bold text-gray-800 mb-2">Cargando negocio...</h1>
        <p id="rubro-negocio" class="text-sm text-gray-500 mb-6">...</p>

        <div class="mb-6 text-left">
            <label for="calendario" class="block text-sm font-medium text-gray-700 mb-2">Selecciona un día:</label>
            <input type="date" id="calendario" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:outline-none text-gray-700 font-semibold shadow-sm">
        </div>

        <div class="border-t border-gray-200 pt-4">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Horarios Disponibles</h2>
            <div id="contenedor-horas" class="grid grid-cols-3 gap-3">
                <p class="text-gray-400 text-sm col-span-3 py-4">Selecciona una fecha para ver los turnos.</p>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        // 🔐 CONFIGURACIÓN DE TU CONEXIÓN SUPABASE (BLINDADA)
        // ========================================================
        const SUPABASE_URL = "https://mvvfkmlgnmkvwnuvtryh.supabase.co";
        // Tu clave pública anon JWT real que conseguimos hoy
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbWstdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcyOTYwMDAsImV4cCI6MjAzMjg3MjAwMH0.1_QfGYsbiI9D9IAqrEdpfSlA_ZV5jkRwM"; 

        const supabaseCliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ID real de tu negocio (Kinesiología Julian Riggieri)
        const NEGOCIO_ID = "02191edc-f3dd-4e18-aab5-b3c79957f478";

        // Elementos de la pantalla
        const txtNombre = document.getElementById('nombre-negocio');
        const txtRubro = document.getElementById('rubro-negocio');
        const inputCalendario = document.getElementById('calendario');
        const contenedorHoras = document.getElementById('contenedor-horas');

        // Variables globales para guardar la selección del cliente
        let turnoSeleccionado = { fechaTexto: '', fechaISO: '', hora: '' };

        // ========================================================
        // 🚀 AL ARRANCAR: Cargar los datos del Negocio en la Web
        // ========================================================
        async function cargarDatosNegocio() {
            try {
                const { data: negocio, error } = await supabaseCliente
                    .from('negocios')
                    .select('*')
                    .eq('id', NEGOCIO_ID)
                    .single();

                if (error || !negocio) {
                    txtNombre.innerText = "Negocio no encontrado";
                    return;
                }

                txtNombre.innerText = negocio.nombre;
                txtRubro.innerText = negocio.rubro || "Kinesiología";
            } catch (err) {
                txtNombre.innerText = "Error de conexión";
            }
        }

        // Ejecutamos la carga inicial del negocio
        cargarDatosNegocio();

        // Escuchar cuando el usuario cambia el día en el calendario
        inputCalendario.addEventListener('change', (e) => {
            const fechaSeleccionada = e.target.value; // Formato AAAA-MM-DD
            if (!fechaSeleccionada) return;

            // truco matemático para evitar que JS reste un día por zona horaria
            const fechaPartes = fechaSeleccionada.split('-');
            const objetoFecha = new Date(fechaPartes[0], fechaPartes[1] - 1, fechaPartes[2]);

            // Obtener el nombre del día de la semana (ej: "miércoles")
            const diaPalabra = objetoFecha.toLocaleDateString('es-ES', { weekday: 'long' });
            
            // Formato lindo para mostrarle al cliente (ej: "Miércoles 3 de Junio")
            const fechaTextoLindo = objetoFecha.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });

            // Llamamos al motor blindado para buscar las horas
            buscarHorariosReales(diaPalabra, fechaTextoLindo, fechaSeleccionada);
        });

        // ========================================================
        // 🎯 MOTOR PRINCIPAL: Buscar agenda y dibujar botones
        // ========================================================
        async function buscarHorariosReales(diaPalabra, fechaTexto, fechaISO) {
            turnoSeleccionado.fechaTexto = fechaTexto;
            turnoSeleccionado.fechaISO = fechaISO;
            
            contenedorHoras.innerHTML = '<p class="text-gray-500 text-sm col-span-3 py-4 animate-pulse">Cargando horarios...</p>';

            // Traemos la configuración completa (sin trabas de filtros estrictos)
            const { data: agenda, error: errAgenda } = await supabaseCliente
                .from('configuracion_agenda')
                .select('*');

            // 1. TU BENDITO ESCUDO DE BLINDAJE INTEGRADO IMPECABLE
            function limpiarTexto(texto) {
                if (!texto) return "";
                return texto
                    .trim()                  
                    .toUpperCase()           
                    .normalize("NFD")        
                    .replace(/[\u0300-\u036f]/g, ""); 
            }

            const agendaEncontrada = agenda && agenda[0];

            if (errAgenda || !agendaEncontrada) {
                contenedorHoras.innerHTML = '<p class="text-gray-400 text-sm col-span-3 py-4">Sin turnos configurados.</p>';
                return;
            }

            // Comparamos el día que tocó el cliente contra el de Supabase bajo tu escudo
            const diaCalculado = limpiarTexto(diaPalabra); 
            const diaBaseDatos = limpiarTexto(agendaEncontrada.dia_semana); 

            if (diaCalculado !== diaBaseDatos) {
                contenedorHoras.innerHTML = '<p class="text-gray-400 text-sm col-span-3 py-4">Sin turnos para este día.</p>';
                return;
            }

            // Si pasa el escudo, leemos las horas de Supabase
            const horaInicioRaw = agendaEncontrada.hora_inicio; // "08:00:00"
            const horaFinRaw = agendaEncontrada.hora_fin;       // "17:00:00"
            const duracion = agendaEncontrada.duracion_minutos; // 30

            // Cortamos el texto con el .split() de forma segura
            const [startH, startM] = horaInicioRaw.split(':').map(Number);
            const [endH, endM] = horaFinRaw.split(':').map(Number);

            let minutosActuales = startH * 60 + startM;
            const minutosFinales = endH * 60 + endM;

            // Limpiamos el contenedor para meter los botones nuevos
            contenedorHoras.innerHTML = '';

            // Bucle matemático para generar los intervalos de tiempo en pantalla
            while (minutosActuales < minutosFinales) {
                const hrs = Math.floor(minutosActuales / 60);
                const mins = minutosActuales % 60;
                
                // Formateo lindo con ceros adelante (ej: "08:30")
                const horaFormateada = `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}`;

                // Creamos el botón verde estilizado de Tailwind
                const boton = document.createElement('button');
                boton.type = 'button';
                boton.className = 'bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-3 rounded-xl shadow-md transition transform active:scale-95 text-sm cursor-pointer';
                boton.innerText = horaFormateada;

                // Acción al tocar la hora elegida
                boton.onclick = () => {
                    turnoSeleccionado.hora = horaFormateada;
                    alert(`¡Turno reservado con éxito!\nFecha: ${turnoSeleccionado.fechaTexto}\nHora: ${turnoSeleccionado.hora}`);
                };

                contenedorHoras.appendChild(boton);

                // Sumamos la duración (ej: +30 minutos) para el siguiente turno
                minutosActuales += duracion;
            }

            // Si el bucle terminó y no se generó ningún botón por algún error de horario
            if (contenedorHoras.children.length === 0) {
                contenedorHoras.innerHTML = '<p class="text-gray-400 text-sm col-span-3 py-4">Sin turnos para este día.</p>';
            }
        }
    </script>
</body>
</html>

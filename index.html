<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Turno App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none; 
        -webkit-tap-highlight-color: transparent; 
    }
    body {
        background-color: #e0e0e0; 
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
    }
    #app-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        background-color: #ffffff;
        overflow: hidden;
    }
    @media (min-aspect-ratio: 432/960) {
        #app-container {
            width: auto;
            aspect-ratio: 432/960;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
    }
    .pantalla {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        display: none; 
        opacity: 0;
        transition: opacity 0.2s ease-in-out; 
    }
    .pantalla.activa {
        display: block;
        opacity: 1;
    }
    #pantalla-portada { background-image: url('portada.jpg'); }
    #pantalla-seleccion { background-image: url('seleccion.jpg'); }
    #pantalla-datos { background-image: url('datos.jpg'); }
    #pantalla-exito { background-image: url('exito.jpg'); }

    .btn-invisible {
        position: absolute;
        background: transparent !important; 
        border: none !important;
        outline: none !important;
        cursor: pointer;
        z-index: 10;
    }
    .texto-dinamico {
        position: absolute;
        color: #333333; 
        font-weight: 600;
        z-index: 5;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: transparent !important;
    }
    .input-invisible {
        position: absolute;
        background: transparent !important; 
        border: none !important;
        outline: none !important;
        color: #333 !important;
        font-size: 18px;
        font-weight: 600;
        padding: 5px 10px;
        z-index: 10;
        text-align: center;
        box-shadow: none !important;
        -webkit-appearance: none;
        appearance: none;
    }
    
    /* 🎨 Extirpación total del color azul/gris basura de los navegadores */
    .input-invisible:focus, .input-invisible:active {
        background: transparent !important;
        outline: none !important;
        box-shadow: none !important;
    }
    .input-invisible:-webkit-autofill,
    .input-invisible:-webkit-autofill:hover, 
    .input-invisible:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0px 1000px transparent inset !important;
        box-shadow: 0 0 0px 1000px transparent inset !important;
        -webkit-text-fill-color: #333 !important;
        transition: background-color 5000s ease-in-out 0s;
    }

    /* Posiciones exactas de tu Portada móvil */
    #txt-nombre { top: 58.0%; left: 23.0%; width: 70.0%; height: 5.0%; font-size: 22px; color: #fff; justify-content: flex-start; font-weight: bold; }
    #txt-telefono { top: 65.2%; left: 23.0%; width: 70.0%; height: 5.0%; font-size: 18px; color: #fff; justify-content: flex-start; }
    #txt-direccion { top: 72.5%; left: 23.0%; width: 70.0%; height: 5.0%; font-size: 15px; color: #fff; justify-content: flex-start; text-align: left; } 
    #btn-comenzar { top: 82.0%; left: 5.0%; width: 90.0%; height: 12.0%; }
    
    /* Botones invisibles para las flechas de Volver Atrás */
    .btn-volver { top: 6.5%; left: 5.5%; width: 15.0%; height: 7.0%; border-radius: 50%; }

    /* Estructura de tu Almanaque flotante */
    #control-mes {
        position: absolute;
        top: 14.8%; left: 16.4%; width: 67.1%; height: 4.7%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
        color: #008080;
        font-weight: bold;
        font-size: 18px;
    }
    #control-mes button {
        background: transparent; color: #008080; border: none; 
        font-size: 20px; font-weight: bold; cursor: pointer;
        padding: 0 10px;
    }
    #contenedor-calendario {
        position: absolute;
        top: 33.5%; left: 9.0%; width: 82.0%; height: 26.5%;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(6, 1fr);
        gap: 2px;
        z-index: 10;
    }
    #contenedor-horas {
        position: absolute;
        top: 69.5%; left: 9.0%; width: 82.0%; height: 25.0%;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        align-content: start;
        overflow-y: auto;
        z-index: 10;
    }
    .celda-dia {
        background: transparent;
        border: none;
        color: #333; 
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .celda-dia.dia-vacio {
        background: transparent;
        cursor: default;
    }
    .celda-dia.seleccionado {
        background: #333 !important; 
        color: #fff !important;
        border-radius: 50%;
    }
    .celda-hora {
        background: #2ecc71; 
        border: none;
        border-radius: 6px;
        color: white;
        font-weight: bold;
        font-size: 14px;
        padding: 6px 0;
        cursor: pointer;
        text-align: center;
    }
    .mensaje-estado {
        grid-column: span 4;
        text-align: center;
        color: #7f8c8d;
        font-size: 15px;
        padding: 15px 0;
        font-weight: 600;
    }

    /* Cajas de texto invisibles de la Pantalla de Datos */
    #in-nombre { top: 34.6%; left: 10.5%; width: 79.0%; height: 6.0%; }
    #in-apellido { top: 47.1%; left: 10.5%; width: 79.0%; height: 6.0%; }
    #in-dni { top: 59.8%; left: 10.5%; width: 79.0%; height: 6.0%; }
    #in-telefono { top: 72.3%; left: 10.5%; width: 79.0%; height: 6.0%; }
    #btn-confirmar { top: 84.2%; left: 14.0%; width: 72.0%; height: 7.5%; }

    /* 🎯 Reestructuración solicitada: Centrado perfecto y orden corregido en Éxito */
    #txt-exito-fecha { top: 33.3%; left: 14.6%; width: 74.3%; height: 6.7%; font-size: 18px; font-weight: bold; color: #333; }
    #txt-exito-hora { top: 47.9%; left: 14.6%; width: 74.3%; height: 6.7%; font-size: 16px; font-weight: bold; color: #333; }
    #btn-mapa { top: 65.6%; left: 9.5%; width: 83.3%; height: 26.3%; }
</style>
</head>
<body>
<div id="app-container">
    
    <!-- PANTALLA 1: PORTADA -->
    <div id="pantalla-portada" class="pantalla activa">
        <div id="txt-nombre" class="texto-dinamico">Cargando...</div>
        <div id="txt-telefono" class="texto-dinamico">...</div>
        <div id="txt-direccion" class="texto-dinamico">...</div>
        <button id="btn-comenzar" class="btn-invisible" onclick="navegarA('pantalla-seleccion'); inicializarCalendario();"></button>
    </div>

    <!-- PANTALLA 2: CALENDARIO -->
    <div id="pantalla-seleccion" class="pantalla">
        <button class="btn-invisible btn-volver" onclick="navegarA('pantalla-portada')"></button>
        <div id="control-mes">
            <button onclick="modificarMes(-1)">◀</button>
            <span id="nombre-mes">-</span>
            <button onclick="modificarMes(1)">▶</button>
        </div>
        <div id="contenedor-calendario"></div>
        <div id="contenedor-horas"></div>
    </div>

    <!-- PANTALLA 3: FORMULARIO -->
    <div id="pantalla-datos" class="pantalla">
        <button class="btn-invisible btn-volver" onclick="navegarA('pantalla-seleccion')"></button>
        <input type="text" id="in-nombre" class="input-invisible" placeholder="">
        <input type="text" id="in-apellido" class="input-invisible" placeholder="">
        <!-- DNI configurado como texto numérico: abre teclado de números en celu y no tiene flechas -->
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="in-dni" class="input-invisible" placeholder="">
        <input type="tel" id="in-telefono" class="input-invisible" placeholder="">
        <button id="btn-confirmar" class="btn-invisible" onclick="confirmarTurno()"></button>
    </div>

    <!-- PANTALLA 4: ÉXITO -->
    <div id="pantalla-exito" class="pantalla">
        <!-- Flecha de volver en éxito activa: borra el turno en caliente si se arrepiente -->
        <button class="btn-invisible btn-volver" onclick="cancelarYVolver()"></button>
        <div id="txt-exito-fecha" class="texto-dinamico">-</div>
        <div id="txt-exito-hora" class="texto-dinamico">-</div>
        <button id="btn-mapa" class="btn-invisible" onclick="abrirMapa()"></button>
    </div>

</div>

<script>
let turnoSeleccionado = { fechaTexto: "", fechaISO: "", hora: "" };
let idTurnoCreado = null; 
let fechaNavegacion = new Date();
const mesesNombres = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

const SUPABASE_URL = 'https://mvvfkmlgnmkvwnuvtryh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbm1rdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM2ODcsImV4cCI6MjA5NTgxOTY4N30.2HG0ZWeEIpMKdi2RNqlqY_bcK99DiRwpEkN-eHVjSe0';
const supabaseCliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const NEGOCIO_ID = "02191edc-f3dd-4e18-aab5-b3c79957f478";

// Cargar dinámicamente los datos en la portada desde la tabla negocios
async function cargarDatosNegocio() {
    try {
        const { data: negocio, error } = await supabaseCliente
            .from('negocios')
            .select('*')
            .eq('id', NEGOCIO_ID)
            .single();

        if (!error && negocio) {
            document.getElementById('txt-nombre').innerText = negocio.nombre;
            document.getElementById('txt-telefono').innerText = negocio.rubro || "Kinesiología";
            document.getElementById('txt-direccion').innerText = negocio.direccion || "Dirección no configurada"; 
        }
    } catch (err) {
        console.error(err);
    }
}
cargarDatosNegocio();

function navegarA(idDestino) {
    document.querySelectorAll('.pantalla').forEach(pantalla => {
        pantalla.classList.remove('activa');
    });
    document.getElementById(idDestino).classList.add('activa');
}

function inicializarCalendario() {
    fechaNavegacion = new Date();
    construirCalendario();
}

function modificarMes(direccion) {
    fechaNavegacion.setMonth(fechaNavegacion.getMonth() + direccion);
    construirCalendario();
    document.getElementById('contenedor-horas').innerHTML = '';
}

function construirCalendario() {
    const contenedor = document.getElementById('contenedor-calendario');
    contenedor.innerHTML = '';
    let año = fechaNavegacion.getFullYear();
    let mes = fechaNavegacion.getMonth();
    document.getElementById('nombre-mes').innerText = mesesNombres[mes] + ' ' + año;
    
    let primerDiaSemana = new Date(año, mes, 1).getDay();
    let totalDiasMes = new Date(año, mes + 1, 0).getDate();

    for (let i = 0; i < primerDiaSemana; i++) {
        let celdaVacia = document.createElement('div');
        celdaVacia.className = 'celda-dia dia-vacio';
        contenedor.appendChild(celdaVacia);
    }

    for (let dia = 1; dia <= totalDiasMes; dia++) {
        let btnDia = document.createElement('button');
        btnDia.className = 'celda-dia';
        btnDia.innerText = dia;

        // Fijamos hora al mediodía UTC para evitar problemas de desfasajes horarios de zona
        let fechaObjeto = new Date(Date.UTC(año, mes, dia, 12, 0, 0));
        let opcionesDiaPalabra = { weekday: 'long', timeZone: 'UTC' };
        let diaSemanaPalabra = fechaObjeto.toLocaleDateString('es-ES', opcionesDiaPalabra).toLowerCase();

        let fechaFormateadaText = dia + ' de ' + mesesNombres[mes] + ' de ' + año;
        let fechaISO = año + '-' + String(mes + 1).padStart(2, '0') + '-' + String(dia).padStart(2, '0');

        btnDia.onclick = () => {
            document.querySelectorAll('.celda-dia').forEach(c => c.classList.remove('seleccionado'));
            btnDia.classList.add('seleccionado');
            buscarHorariosReales(diaSemanaPalabra, fechaFormateadaText, fechaISO);
        };
        contenedor.appendChild(btnDia);
    }
}

// 🎯 NUEVO MOTOR DE AGENDA GLOBALIZADO: Levanta martes, miércoles y jueves sin fugas
async function buscarHorariosReales(diaPalabra, fechaTexto, fechaISO) {
    turnoSeleccionado.fechaTexto = fechaTexto;
    turnoSeleccionado.fechaISO = fechaISO;
    const contenedorHoras = document.getElementById('contenedor-horas');
    contenedorHoras.innerHTML = '<p class="mensaje-estado">Cargando...</p>';

    // Bajamos el paquete completo de agendas de este negocio
    const { data: agenda, error: errAgenda } = await supabaseCliente
      .from('configuracion_agenda')
      .select('*')
      .eq('negocio_id', NEGOCIO_ID);

    function limpiarTexto(texto) {
        if (!texto) return "";
        return texto.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    const diaCalculadoClean = limpiarTexto(diaPalabra);
    
    // Macheamos el día de la semana contra la base de datos de forma blindada
    let agendaDelDia = null;
    if (agenda) {
        agendaDelDia = agenda.find(item => limpiarTexto(item.dia_semana) === diaCalculadoClean);
    }

    if (errAgenda || !agendaDelDia) {
        contenedorHoras.innerHTML = '<p class="mensaje-estado">Sin turnos para este día.</p>';
        return;
    }

    // Buscamos turnos ocupados
    const { data: ocupados, error: errOcupados } = await supabaseCliente
        .from('turnos_activos')
        .select('hora')
        .eq('fecha', fechaISO)
        .eq('estado', 'reservado');

    let listadoOcupados = [];
    if (ocupados) {
        listadoOcupados = ocupados.map(o => o.hora.substring(0, 5));
    }
    
    contenedorHoras.innerHTML = '';

    let intervalo = agendaDelDia.duracion_minutos || 30;
    let [horaActual, minActual] = agendaDelDia.hora_inicio.split(':').map(Number);
    let [horaFin, minFin] = agendaDelDia.hora_fin.split(':').map(Number);
    
    let minutosTotalesInicio = horaActual * 60 + minActual;
    let minutesTotalesFin = horaFin * 60 + minFin;

    // Generador matemático de intervalos de tiempo
    while (minutosTotalesInicio < minutesTotalesFin) {
        let hStr = String(Math.floor(minutosTotalesInicio / 60)).padStart(2, '0');
        let mStr = String(minutosTotalesInicio % 60).padStart(2, '0');
        let horaTexto = hStr + ':' + mStr;
        
        if (!listadoOcupados.includes(horaTexto)) {
            let btnHora = document.createElement('button');
            btnHora.className = 'celda-hora';
            btnHora.innerText = horaTexto;
            btnHora.onclick = () => clickEnHora(horaTexto);
            contenedorHoras.appendChild(btnHora);
        }
        minutosTotalesInicio += intervalo;
    }
    
    if (contenedorHoras.innerHTML === '') {
        contenedorHoras.innerHTML = '<p class="mensaje-estado">No quedan horarios.</p>';
    }
}

function clickEnHora(horaElegida) {
    turnoSeleccionado.hora = horaElegida;
    navegarA('pantalla-datos');
}

// Envío a Supabase e inyección ordenada del éxito
async function confirmarTurno() {
    let nombre = document.getElementById('in-nombre').value.trim();
    let apellido = document.getElementById('in-apellido').value.trim();
    let dni = document.getElementById('in-dni').value.trim();
    let telefono = document.getElementById('in-telefono').value.trim();

    if(nombre === "" || apellido === "") {
        alert("Por favor, ingresá tu Nombre y Apellido.");
        return;
    }

    const { data, error } = await supabaseCliente
        .from('turnos_activos')
        .insert([{
            negocio_id: NEGOCIO_ID,
            fecha: turnoSeleccionado.fechaISO,
            hora: turnoSeleccionado.hora + ":00",
            estado: 'reservado',
            cliente_nombre: nombre + ' ' + apellido,
            cliente_telefono: telefono
        }])
        .select();

    if (error) {
        alert("Hubo un error al reservar el turno. Por favor reintentá.");
        console.error(error);
        return;
    }

    // Registramos la identificación del turno recién nacido para habilitar el arrepentimiento
    if (data && data[0]) {
        idTurnoCreado = data[0].identificacion;
    }

    // 🎯 REESTRUCTURACIÓN DE CAMPOS SOLICITADA EN ACCIÓN: Nombre arriba, Fecha y Hora abajo
    document.getElementById('txt-exito-fecha').innerText = nombre + ' ' + apellido;
    document.getElementById('txt-exito-hora').innerText = turnoSeleccionado.fechaTexto + ' - ' + turnoSeleccionado.hora + ' hs';
    
    navegarA('pantalla-exito');
}

// Función del botón Volver en éxito: Borra en caliente y libera la grilla
async function cancelarYVolver() {
    if (idTurnoCreado) {
        await supabaseCliente
            .from('turnos_activos')
            .delete()
            .eq('identificacion', idTurnoCreado);
        
        idTurnoCreado = null; 
    }
    navegarA('pantalla-seleccion');
    construirCalendario();
}

function abrirMapa() {
    window.open('https://maps.google.com/?q=Av.+Francisco+Beiro+y+Sanabria,+Devoto', '_blank');
}
</script>
</body>
</html>

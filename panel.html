<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acceso Profesional - Mi Turno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(180deg, #009E9B 0%, #007D82 100%); 
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; 
        }
        .contenedor { width: 90%; max-width: 360px; text-align: center; }
        .logo { max-width: 100px; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 900; margin-bottom: 30px; letter-spacing: -1px; }

        .caja-login { 
            background: white; border-radius: 20px; padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); color: #333; text-align: left;
        }
        label { font-weight: 800; color: #007D82; display: block; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #EEE; 
            margin-bottom: 20px; box-sizing: border-box; font-size: 16px; font-weight: 700;
        }
        .btn-entrar { 
            width: 100%; background: #F4B41A; color: white; border: none; padding: 18px; 
            border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .registro { margin-top: 25px; font-size: 14px; color: white; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="https://mataleon72-lgtm.github.io/MiTurno/logotipo%20mi%20turno.png" class="logo">
        <h1>Acceso Profesional</h1>

        <div class="caja-login">
            <label>Tu Alias (Código)</label>
            <input type="text" id="login-alias" placeholder="Ej: JULI">
            
            <label>Contraseña</label>
            <input type="password" id="login-pass" placeholder="••••••••">

            <button class="btn-entrar" onclick="ingresar()">Ingresar al Panel</button>
        </div>

        <p class="registro">¿Aún no tienes cuenta? <br> <b>Regístrate desde la web oficial</b></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://mvvfkmlgnmkvwnuvtryh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbm1rdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM2ODcsImV4cCI6MjA5NTgxOTY4N30.2HG0ZWeEIpMKdi2RNqlqY_bcK99DiRwpEkN-eHVjSe0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function ingresar() {
            const alias = document.getElementById('login-alias').value.toUpperCase().trim();
            const pass = document.getElementById('login-pass').value.trim();

            if(!alias || !pass) return alert("Completa tus datos");

            const { data, error } = await supabase.from('negocios').select('*').eq('alias', alias).eq('password', pass).single();

            if(error || !data) return alert("Alias o contraseña incorrectos");

            localStorage.setItem('mi_turno_negocio_id', data.id);
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>

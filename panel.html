<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Negocio - Mi Turno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 20px; }
        .pantalla { display: none; background: #fff; padding: 20px; border-radius: 8px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .pantalla.activa { display: block; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #008080; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button.secundario { background: #7f8c8d; }
        button.peligro { background: #e74c3c; padding: 5px; margin-top: 5px; font-size: 0.8em; }
        .turno-item, .sucursal-item { background: #ecf0f1; padding: 10px; margin: 5px 0; border-radius: 5px; }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #ccc; }
        .header-sucursal { background: #dff9fb; padding: 10px; border-radius: 5px; margin-bottom: 15px; border-left: 4px solid #008080; }
    </style>
</head>
<body>

    <div id="pantalla-registro" class="pantalla activa">
        <h2>Crear mi Negocio</h2>
        <input type="text" id="reg-nombre" placeholder="Tu Nombre / Razón Social">
        <input type="text" id="reg-alias" placeholder="Elegí tu Alias (Ej: DR-PEREZ)">
        <input type="text" id="reg-rubro" placeholder="Rubro (Ej: Kinesiología)">
        <input type="text" id="reg-telefono" placeholder="Teléfono de contacto">
        <input type="password" id="reg-password" placeholder="Crear una Contraseña">
        <button onclick="registrarNegocio()">Registrarme</button>
        <button class="secundario" onclick="navegarA('pantalla-login')">Ya tengo cuenta. Entrar</button>
    </div>

    <div id="pantalla-login" class="pantalla">
        <h2>Acceso Profesional</h2>
        <input type="text" id="log-alias" placeholder="Tu Alias (Ej: DR-PEREZ)">
        <input type="password" id="log-password" placeholder="Contraseña">
        <button onclick="loginNegocio()">Ingresar</button>
        <button class="secundario" onclick="navegarA('pantalla-registro')">No tengo cuenta</button>
    </div>

    <div id="pantalla-sucursales" class="pantalla">
        <h2>Mis Consultorios</h2>
        <p style="font-size: 0.9em; color: #555;">Acá podés gestionar los lugares donde atendés.</p>
        <div id="lista-sucursales">Cargando...</div>
        <hr>
        <h3>Agregar Nuevo Lugar</h3>
        <input type="text" id="suc-nombre" placeholder="Nombre (Ej: Clínica Morón)">
        <input type="text" id="suc-direccion" placeholder="Dirección exacta (Ej: San Martín 123)">
        <button onclick="crearSucursal()">Guardar Lugar</button>
        <hr>
        <button class="secundario" onclick="irAAgendaSiHaySucursales()">Ir a mi Agenda</button>
    </div>

    <div id="pantalla-agenda" class="pantalla">
        <h2>Mi Agenda</h2>
        <div class="header-sucursal">
            <label>Viendo turnos de:</label>
            <select id="filtro-sucursal" onchange="cargarTurnosDelDia()"></select>
        </div>
        <input type="date" id="filtro-fecha" onchange="cargarTurnosDelDia()">
        <div id="lista-turnos"></div>
        <hr>
        <button onclick="navegarA('pantalla-configuracion')">Configurar Horarios</button>
        <button onclick="navegarA('pantalla-sucursales')" style="background: #34495e;">Mis Consultorios</button>
        <button class="secundario" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div id="pantalla-configuracion" class="pantalla">
        <h2>Mis Horarios</h2>
        <div class="header-sucursal">
            <label>Configurar horarios para:</label>
            <select id="conf-sucursal"></select>
        </div>
        <select id="conf-dia">
            <option value="lunes">Lunes</option>
            <option value="martes">Martes</option>
            <option value="miercoles">Miércoles</option>
            <option value="jueves">Jueves</option>
            <option value="viernes">Viernes</option>
            <option value="sabado">Sábado</option>
            <option value="domingo">Domingo</option>
        </select>
        <label>Hora Inicio:</label>
        <input type="time" id="conf-inicio">
        <label>Hora Fin:</label>
        <input type="time" id="conf-fin">
        <label>Duración del turno (min):</label>
        <input type="number" id="conf-duracion" value="30">
        
        <button onclick="guardarFranjaHoraria()">Agregar Franja</button>
        <hr>
        <button class="secundario" onclick="navegarA('pantalla-agenda')">Volver a mi Agenda</button>
    </div>

    <script>
        // CONEXIÓN SUPABASE
        const SUPABASE_URL = 'https://mvvfkmlgnmkvwnuvtryh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12dmZrbWxnbm1rdndudXZ0cnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDM2ODcsImV4cCI6MjA5NTgxOTY4N30.2HG0ZWeEIpMKdi2RNqlqY_bcK99DiRwpEkN-eHVjSe0';
        const supabaseCliente = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let miNegocioID = null;
        let misSucursales = [];

        function navegarA(idDestino) {
            document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
            document.getElementById(idDestino).classList.add('activa');
        }

        // REGISTRAR NEGOCIO NUEVO (CON BLINDAJE DE ESPACIOS)
        // REGISTRAR NEGOCIO NUEVO (CON REDIRECCIÓN A MERCADO PAGO)
        async function registrarNegocio() {
            const nombre = document.getElementById('reg-nombre').value.trim();
            const alias = document.getElementById('reg-alias').value.trim().toUpperCase(); // Filtro estricto
            const rubro = document.getElementById('reg-rubro').value.trim();
            const telefono = document.getElementById('reg-telefono').value.trim();
            const password = document.getElementById('reg-password').value;

            if(!nombre || !alias || !password || !rubro) return alert("Nombre, Alias, Rubro y Contraseña son obligatorios.");

            // Guardamos los datos en Supabase primero
            const { error } = await supabaseCliente.from('negocios').insert([{ nombre, alias, rubro, telefono, password }]);
            if (error) return alert("Error al registrar: " + error.message);
            
            // Le avisamos al profesional y lo pateamos a Mercado Pago
            alert("¡Tus datos se guardaron con éxito! Ahora te redirigiremos a Mercado Pago para activar tu cuenta.");
            window.location.href = "https://www.mercadopago.com.ar/subscriptions/checkout?preapproval_plan_id=79e1febbb0b9457198d99cbe3f13fbbf";
        }

        // LOGIN AL PANEL (CON BLINDAJE DE ESPACIOS)
        async function loginNegocio() {
            const alias = document.getElementById('log-alias').value.trim().toUpperCase(); // Filtro estricto
            const password = document.getElementById('log-password').value;

            const { data, error } = await supabaseCliente.from('negocios').select('*').eq('alias', alias).eq('password', password).single();

            if (error || !data) {
                alert("Alias o contraseña incorrectos.");
            } else {
                miNegocioID = data.id; 
                document.getElementById('filtro-fecha').valueAsDate = new Date(); 
                await cargarSucursales();
            }
        }

        // GESTIÓN DE SUCURSALES
        async function cargarSucursales() {
            const { data, error } = await supabaseCliente.from('sucursales').select('*').eq('negocio_id', miNegocioID);
            if (error) return console.error(error);
            
            misSucursales = data || [];
            renderizarListaSucursales();
            actualizarSelectoresSucursales();

            if (misSucursales.length === 0) {
                navegarA('pantalla-sucursales');
            } else {
                navegarA('pantalla-agenda');
                cargarTurnosDelDia();
            }
        }

        function renderizarListaSucursales() {
            const div = document.getElementById('lista-sucursales');
            if (misSucursales.length === 0) {
                div.innerHTML = "<p>Aún no tenés lugares creados.</p>";
                return;
            }
            div.innerHTML = "";
            misSucursales.forEach(suc => {
                div.innerHTML += `
                    <div class="sucursal-item">
                        <strong>${suc.nombre}</strong><br>
                        <small>${suc.direccion}</small><br>
                        <button class="peligro" onclick="borrarSucursal('${suc.id}')">Borrar</button>
                    </div>
                `;
            });
        }

        function actualizarSelectoresSucursales() {
            const selAgenda = document.getElementById('filtro-sucursal');
            const selConfig = document.getElementById('conf-sucursal');
            selAgenda.innerHTML = ""; selConfig.innerHTML = "";
            
            misSucursales.forEach(suc => {
                let opt = `<option value="${suc.id}">${suc.nombre}</option>`;
                selAgenda.innerHTML += opt;
                selConfig.innerHTML += opt;
            });
        }

        async function crearSucursal() {
            const nombre = document.getElementById('suc-nombre').value.trim();
            const direccion = document.getElementById('suc-direccion').value.trim();
            if(!nombre || !direccion) return alert("Completá nombre y dirección.");

            const { error } = await supabaseCliente.from('sucursales').insert([{ negocio_id: miNegocioID, nombre, direccion }]);
            if (error) return alert("Error: " + error.message);
            
            document.getElementById('suc-nombre').value = '';
            document.getElementById('suc-direccion').value = '';
            await cargarSucursales();
        }

        async function borrarSucursal(id) {
            if(!confirm("¿Seguro querés borrar este lugar? Se borrarán sus horarios.")) return;
            const { error } = await supabaseCliente.from('sucursales').delete().eq('id', id);
            if (error) return alert("Error: " + error.message);
            await cargarSucursales();
        }

        function irAAgendaSiHaySucursales() {
            if (misSucursales.length === 0) return alert("Tenés que agregar al menos un consultorio primero.");
            navegarA('pantalla-agenda');
            cargarTurnosDelDia();
        }

        // AGENDA Y HORARIOS
        async function cargarTurnosDelDia() {
            if (misSucursales.length === 0) return;
            const fecha = document.getElementById('filtro-fecha').value;
            const sucursalId = document.getElementById('filtro-sucursal').value;
            const div = document.getElementById('lista-turnos');
            div.innerHTML = "Buscando turnos...";

            const { data, error } = await supabaseCliente.from('turnos_activos')
                .select('*').eq('negocio_id', miNegocioID).eq('sucursal_id', sucursalId).eq('fecha', fecha).order('hora', { ascending: true });

            if (error) return div.innerHTML = "Error al cargar.";
            if (data.length === 0) return div.innerHTML = "<p>No tenés turnos en esta sucursal hoy.</p>";

            div.innerHTML = "";
            data.forEach(turno => {
                div.innerHTML += `<div class="turno-item"><strong>${turno.hora.substring(0,5)} hs</strong> - ${turno.cliente_nombre}</div>`;
            });
        }

        async function guardarFranjaHoraria() {
            const sucursalId = document.getElementById('conf-sucursal').value;
            const dia = document.getElementById('conf-dia').value;
            const inicio = document.getElementById('conf-inicio').value;
            const fin = document.getElementById('conf-fin').value;
            const duracion = document.getElementById('conf-duracion').value;

            if(!inicio || !fin || !sucursalId) return alert("Completá todos los datos.");

            const { error } = await supabaseCliente.from('configuracion_agenda').insert([{
                negocio_id: miNegocioID, sucursal_id: sucursalId, dia_semana: dia, hora_inicio: inicio, hora_fin: fin, duracion_minutos: duracion, cupo_maximo: 1
            }]);

            if (error) return alert("Error al guardar: " + error.message);
            alert(`Franja guardada con éxito.`);
        }

        function cerrarSesion() {
            miNegocioID = null; misSucursales = [];
            document.getElementById('log-password').value = '';
            navegarA('pantalla-login');
        }
    </script>
</body>
</html>
